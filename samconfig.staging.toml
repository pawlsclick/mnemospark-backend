version = 0.1

[default.deploy.parameters]
stack_name = "mnemospark-staging"
resolve_s3 = true
s3_prefix = "mnemospark-staging"
confirm_changeset = false
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
disable_rollback = false
parameter_overrides = "StageName=staging PaymentSettlementMode=REPLACE_MOCK_OR_ONCHAIN BaseRpcUrl=REPLACE_BASE_RPC_URL MnemosparkRecipientWallet=REPLACE_RECIPIENT_WALLET RelayerWalletAddress=REPLACE_RELAYER_WALLET PaymentAssetAddress=REPLACE_PAYMENT_ASSET PriceStorageFloor=0 PriceStorageMarkup=0"
image_repositories = []
