openapi: "3.2.0"
info:
  title: mnemospark-backend API
  version: "0.1.5"
  license:
    name: Proprietary
  description: >
    Descriptive OpenAPI skeleton for currently deployed mnemospark-backend
    public endpoints. Paths are unversioned today, but treated as v1 semantics.
servers:
  - url: https://{api_id}.execute-api.{region}.amazonaws.com/{stage}
    description: Customer REST API (wallet-proof) invoke URL placeholder
    variables:
      api_id:
        default: your-api-id
      region:
        default: your-region
      stage:
        default: prod
  - url: https://{http_api_id}.execute-api.{region}.amazonaws.com/{stage}
    description: Internal dashboard GraphQL HTTP API (separate from customer REST API)
    variables:
      http_api_id:
        default: your-dashboard-http-api-id
      region:
        default: your-region
      stage:
        default: prod
security:
  - walletProof: []
tags:
  - name: pricing
    description: Storage price quote operations
  - name: payments
    description: Payment settlement operations
  - name: storage
    description: Wallet-scoped storage object operations
  - name: dashboard
    description: Internal Ops Console (dashboard v2) read-only GraphQL transport
paths:
  /price-storage:
    post:
      tags: [pricing]
      summary: Create a storage price quote
      description: >
        Calculates storage pricing and returns a quote for a wallet-scoped object.
        Deploy-time configuration uses Lambda environment variables `PRICE_STORAGE_FLOOR`
        (minimum USD subtotal before markup) and `PRICE_STORAGE_MARKUP` (markup percent);
        see `docs/price-storage.md`.
      operationId: postPriceStorage
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceStorageRequest"
      responses:
        "200":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceStorageResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /payment/settle:
    post:
      tags: [payments]
      summary: Verify and settle storage payment (quote or monthly renewal)
      description: >
        Two modes: (1) **Quote settlement** after price-storage: requires `quote_id`
        and a valid quote row. (2) **Monthly renewal**: `renewal: true` and
        `object_key`; uses active storage inventory for price and S3 head check;
        writes `RENEWAL_TRANSACTION_LOG` with a synthetic ledger `quote_id`
        `renewal#YYYY-MM#<url_safe_object_key>` (UTC month). Both modes use the same
        x402 / EIP-712 flow. Errors may include `renewal_not_registered` or
        `object_not_in_storage` (404) for renewal mode.
      operationId: postPaymentSettle
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/PaymentSignatureHeader"
        - $ref: "#/components/parameters/XPaymentHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentSettleRequest"
      responses:
        "200":
          description: Payment settled and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettleResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "402":
          $ref: "#/components/responses/PaymentRequiredError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/upload:
    post:
      tags: [storage]
      summary: Upload object ciphertext or request presigned upload URL
      description: >
        Accepts encrypted payload metadata and either uploads inline ciphertext
        or returns a presigned URL flow depending on mode.
      operationId: postStorageUpload
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/PaymentSignatureHeader"
        - $ref: "#/components/parameters/XPaymentHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageUploadRequest"
      responses:
        "200":
          description: Upload accepted or completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadResponse"
        "207":
          description: Payment settled but upload needs retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadResponse"
        "400":
          $ref: "#/components/responses/StorageBadRequestError"
        "402":
          $ref: "#/components/responses/PaymentRequiredError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/upload/confirm:
    post:
      tags: [storage]
      summary: Confirm presigned upload completion
      description: Confirms presigned upload object existence and finalizes transaction state.
      operationId: postStorageUploadConfirm
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadConfirmRequest"
      responses:
        "200":
          description: Upload confirmation finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadResponse"
        "400":
          $ref: "#/components/responses/StorageBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/ls:
    get:
      tags: [storage]
      summary: Stat or list wallet bucket objects
      description: >
        With `object_key`, returns metadata for that key (head_object). Without
        `object_key`, lists object keys in the wallet bucket via S3 ListObjectsV2
        (paginated).
      operationId: getStorageLs
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/WalletAddressQuery"
        - $ref: "#/components/parameters/StorageLsObjectKeyQuery"
        - $ref: "#/components/parameters/LocationQuery"
        - $ref: "#/components/parameters/StorageLsContinuationTokenQuery"
        - $ref: "#/components/parameters/StorageLsMaxKeysQuery"
        - $ref: "#/components/parameters/StorageLsPrefixQuery"
      responses:
        "200":
          description: Stat (single object) or list response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StorageLsStatResponse"
                  - $ref: "#/components/schemas/StorageLsListResponse"
        "400":
          $ref: "#/components/responses/StorageBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [storage]
      summary: Stat or list wallet bucket objects (JSON body)
      description: >
        Same semantics as GET. `object_key` optional; omit for list mode.
        Optional `continuation_token`, `max_keys` (1–1000), and `prefix`.
      operationId: postStorageLs
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageLsRequest"
      responses:
        "200":
          description: Stat (single object) or list response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StorageLsStatResponse"
                  - $ref: "#/components/schemas/StorageLsListResponse"
        "400":
          $ref: "#/components/responses/StorageBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/download:
    get:
      tags: [storage]
      summary: Create presigned download URL
      description: Generates a short-lived presigned URL for object download.
      operationId: getStorageDownload
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/WalletAddressQuery"
        - $ref: "#/components/parameters/ObjectKeyQuery"
        - $ref: "#/components/parameters/LocationQuery"
        - $ref: "#/components/parameters/ExpiresInSecondsQuery"
      responses:
        "200":
          description: Presigned download URL created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDownloadResponse"
        "400":
          $ref: "#/components/responses/StorageBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "405":
          description: Method not allowed (only GET and POST are supported)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [storage]
      summary: Create presigned download URL (JSON body variant)
      description: POST variant of /storage/download using JSON body payload.
      operationId: postStorageDownload
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/StorageObjectRequest"
                - type: object
                  properties:
                    expires_in_seconds:
                      type: integer
                      minimum: 1
                      maximum: 3600
      responses:
        "200":
          description: Presigned download URL created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDownloadResponse"
        "400":
          $ref: "#/components/responses/StorageBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "405":
          description: Method not allowed (only GET and POST are supported)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/delete:
    delete:
      tags: [storage]
      summary: Delete object from wallet bucket
      description: Deletes object and removes bucket when it becomes empty.
      operationId: deleteStorageObject
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/WalletAddressQuery"
        - $ref: "#/components/parameters/ObjectKeyQuery"
        - $ref: "#/components/parameters/LocationQuery"
      responses:
        "200":
          description: Object deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDeleteResponse"
        "400":
          $ref: "#/components/responses/StorageBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [storage]
      summary: Delete object (JSON body variant)
      description: POST variant of /storage/delete using JSON body payload.
      operationId: postStorageDelete
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageObjectRequest"
      responses:
        "200":
          description: Object deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDeleteResponse"
        "400":
          $ref: "#/components/responses/StorageBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /graphql:
    post:
      tags: [dashboard]
      summary: Execute GraphQL operation (dashboard v2)
      description: >
        Standard GraphQL-over-HTTP POST. Field-level types and operations are defined in
        `services/dashboard_graphql/schema.graphql` (Strawberry), including dashboard
        analytics queries (events, wallets, quote funnel, health, trace) for Ops Console v2.
        This operation documents the HTTP envelope only. The API is deployed on a **separate** API Gateway HTTP API
        from the customer REST API; use the **dashboardGraphqlHttpApi** server entry.
      operationId: postDashboardGraphql
      servers:
        - url: https://{http_api_id}.execute-api.{region}.amazonaws.com/{stage}
          variables:
            http_api_id:
              default: your-dashboard-http-api-id
            region:
              default: your-region
            stage:
              default: prod
      security:
        - dashboardApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardGraphqlRequest"
      responses:
        "200":
          description: GraphQL response (data and/or errors)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardGraphqlResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          description: Missing or invalid x-api-key (Lambda authorizer + Secrets Manager).
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    options:
      tags: [dashboard]
      summary: CORS preflight for GraphQL
      description: >
        API Gateway may handle OPTIONS; the Lambda also returns 204 with CORS headers for
        `/graphql` preflight when integrated.
      operationId: optionsDashboardGraphql
      servers:
        - url: https://{http_api_id}.execute-api.{region}.amazonaws.com/{stage}
          variables:
            http_api_id:
              default: your-dashboard-http-api-id
            region:
              default: your-region
            stage:
              default: prod
      security: []
      responses:
        "204":
          description: No content (CORS preflight)

components:
  securitySchemes:
    walletProof:
      type: apiKey
      in: header
      name: X-Wallet-Signature
      description: >
        Wallet proof authentication. The client proves control of a wallet by signing
        a structured request payload (EIP-712 MnemosparkRequest: method, path,
        walletAddress, nonce, timestamp) and sending the result in this header.
        The header value is base64-encoded JSON with payloadB64, signature, and address.
        The backend verifies the EIP-712 signature and rejects requests with missing,
        malformed, or invalid proofs (403). Required for all wallet-scoped endpoints.

    dashboardApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: >
        Shared secret for the dashboard GraphQL HTTP API. The Lambda authorizer validates
        this header against the current value in AWS Secrets Manager (plaintext or JSON with
        api_key, apiKey, or api_key_dashboard). Prefer a server-side proxy (Next.js route) or Tailscale; do not
        expose the key in public client bundles.

  parameters:
    WalletAddressQuery:
      name: wallet_address
      in: query
      required: true
      schema:
        type: string
      description: Wallet address that scopes access to object operations.
    ObjectKeyQuery:
      name: object_key
      in: query
      required: true
      schema:
        type: string
      description: Wallet-scoped object key (single path segment).
    StorageLsObjectKeyQuery:
      name: object_key
      in: query
      required: false
      schema:
        type: string
      description: >
        Object key for stat mode (single path segment). Omit to list all keys
        in the wallet bucket (S3 list).
    StorageLsContinuationTokenQuery:
      name: continuation_token
      in: query
      required: false
      schema:
        type: string
      description: S3 list pagination continuation token (list mode only).
    StorageLsMaxKeysQuery:
      name: max_keys
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
      description: Maximum keys per list page (default 1000, capped at 1000).
    StorageLsPrefixQuery:
      name: prefix
      in: query
      required: false
      schema:
        type: string
      description: Optional S3 key prefix filter (list mode only).
    LocationQuery:
      name: location
      in: query
      required: false
      schema:
        type: string
      description: Optional AWS region/location override.
    ExpiresInSecondsQuery:
      name: expires_in_seconds
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 3600
      description: Presigned download URL TTL in seconds.
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Optional idempotency key for upload request deduplication.
    PaymentSignatureHeader:
      name: PAYMENT-SIGNATURE
      in: header
      required: false
      schema:
        type: string
      description: Optional payment authorization envelope.
    XPaymentHeader:
      name: x-payment
      in: header
      required: false
      schema:
        type: string
      description: Optional payment authorization envelope alternate header.

  responses:
    BadRequestError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    StorageBadRequestError:
      description: >
        Request validation failed (`error` commonly `Bad request`), or the requested `location`/`region`
        does not match the wallet-scoped S3 bucket's AWS home region (`error`: `bucket_region_mismatch`,
        with `details.requested_region` and `details.bucket_region`).
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/ErrorResponse"
              - $ref: "#/components/schemas/BucketRegionMismatchErrorResponse"
    ForbiddenError:
      description: Wallet proof validation or authorization failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Referenced quote, bucket, or object not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Idempotency or state conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PaymentRequiredError:
      description: Payment authorization is required or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unhandled internal error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    DashboardGraphqlRequest:
      type: object
      description: Standard GraphQL-over-HTTP JSON body.
      properties:
        query:
          type: string
          description: GraphQL query or mutation document.
        variables:
          type: object
          additionalProperties: true
          nullable: true
          description: Optional variables map for the operation.
        operationName:
          type: string
          nullable: true
          description: Optional operation name when the document defines multiple operations.
      required:
        - query

    DashboardGraphqlResponse:
      type: object
      description: >
        GraphQL response envelope. The `data` shape depends on the operation; see the SDL
        in `services/dashboard_graphql/schema.graphql`.
      properties:
        data:
          type: object
          additionalProperties: true
          nullable: true
        errors:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/DashboardGraphqlError"
      additionalProperties: true

    DashboardGraphqlError:
      type: object
      properties:
        message:
          type: string
        locations:
          type: array
          items:
            type: object
            additionalProperties: true
        path:
          type: array
          items: {}
        extensions:
          type: object
          additionalProperties: true
      required:
        - message

    PriceStorageRequest:
      type: object
      required:
        - wallet_address
        - object_id
        - object_id_hash
        - gb
        - provider
        - region
      properties:
        wallet_address:
          type: string
        object_id:
          type: string
        object_id_hash:
          type: string
        gb:
          type: number
          minimum: 0
          exclusiveMinimum: 0
          description: Storage size in GB; must be greater than 0.
        provider:
          type: string
          description: Currently expected as "aws".
        region:
          type: string

    StorageUploadRequest:
      type: object
      required:
        - quote_id
        - wallet_address
        - object_id
        - object_id_hash
        - wrapped_dek
      properties:
        quote_id:
          type: string
        wallet_address:
          type: string
        object_id:
          type: string
        object_id_hash:
          type: string
        object_key:
          type: string
          description: Optional override for object_id.
        mode:
          type: string
          enum: [inline, presigned]
          description: Inline uploads include ciphertext; presigned returns upload URL.
        ciphertext:
          type: string
          description: Base64-encoded encrypted content for inline mode.
        wrapped_dek:
          type: string
          description: Base64-encoded wrapped DEK metadata.
        content_sha256:
          type: string
        content_length_bytes:
          type: integer
          minimum: 0
        provider:
          type: string
        location:
          type: string

    PaymentSettleQuoteRequest:
      type: object
      required:
        - wallet_address
        - quote_id
      properties:
        wallet_address:
          type: string
        quote_id:
          type: string
        payment:
          type: object
          description: Inline payment authorization payload.
        payment_authorization:
          oneOf:
            - type: object
            - type: string
          description: Alternate inline payment authorization envelope.

    PaymentSettleRenewalRequest:
      type: object
      required:
        - wallet_address
        - renewal
        - object_key
      properties:
        wallet_address:
          type: string
        renewal:
          const: true
        object_key:
          type: string
        payment:
          type: object
        payment_authorization:
          oneOf:
            - type: object
            - type: string

    PaymentSettleRequest:
      oneOf:
        - $ref: "#/components/schemas/PaymentSettleQuoteRequest"
        - $ref: "#/components/schemas/PaymentSettleRenewalRequest"

    UploadConfirmRequest:
      type: object
      required:
        - wallet_address
        - object_key
        - idempotency_key
        - quote_id
      properties:
        wallet_address:
          type: string
        object_key:
          type: string
        idempotency_key:
          type: string
        quote_id:
          type: string

    StorageObjectRequest:
      type: object
      required:
        - wallet_address
        - object_key
      properties:
        wallet_address:
          type: string
        object_key:
          type: string
        location:
          type: string

    StorageLsRequest:
      type: object
      required:
        - wallet_address
      properties:
        wallet_address:
          type: string
        object_key:
          type: string
          description: Omit for list mode.
        location:
          type: string
        continuation_token:
          type: string
        max_keys:
          type: integer
          minimum: 1
          maximum: 1000
        prefix:
          type: string

    PriceStorageResponse:
      type: object
      properties:
        timestamp:
          type: string
        quote_id:
          type: string
        storage_price:
          type: number
        addr:
          type: string
        object_id:
          type: string
        object_id_hash:
          type: string
        object_size_gb:
          type: number
        provider:
          type: string
        location:
          type: string
      required:
        - quote_id
        - storage_price
        - addr
        - object_id
        - provider
        - location

    StorageUploadResponse:
      type: object
      properties:
        quote_id:
          type: string
        addr:
          type: string
        addr_hash:
          type: string
        trans_id:
          type: string
        storage_price:
          type: number
        object_id:
          type: string
        object_key:
          type: string
        provider:
          type: string
        bucket_name:
          type: string
        location:
          type: string
        upload_url:
          type: string
          format: uri
        upload_headers:
          type: object
          additionalProperties:
            type: string
        confirmation_required:
          type: boolean
        upload_failed:
          type: boolean
        error:
          type: string

    PaymentSettleResponse:
      type: object
      required:
        - quote_id
        - wallet_address
        - trans_id
        - network
        - asset
        - amount
        - payment_status
        - timestamp
      properties:
        quote_id:
          type: string
          description: Upload quote UUID or synthetic renewal id for the payment ledger.
        wallet_address:
          type: string
        trans_id:
          type: string
        network:
          type: string
        asset:
          type: string
        amount:
          type: string
        payment_status:
          type: string
          enum: [confirmed]
        timestamp:
          type: string
        result:
          type: string
          enum: [already_settled]
          description: Present on idempotent retries (quote or renewal log duplicate).
        renewal:
          type: boolean
        object_key:
          type: string
        billing_period:
