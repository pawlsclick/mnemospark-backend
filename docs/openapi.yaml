openapi: "3.2.0"
info:
  title: mnemospark-backend API
  version: "0.1.6"
  license:
    name: Proprietary
  description: >
    Descriptive OpenAPI skeleton for currently deployed mnemospark-backend
    public endpoints. Paths are unversioned today, but treated as v1 semantics.
servers:
  - url: https://{api_id}.execute-api.{region}.amazonaws.com/{stage}
    description: Customer REST API (wallet-proof) invoke URL placeholder
    variables:
      api_id:
        default: your-api-id
      region:
        default: your-region
      stage:
        default: prod
  - url: https://{http_api_id}.execute-api.{region}.amazonaws.com/{stage}
    description: Internal dashboard GraphQL HTTP API (separate from customer REST API)
    variables:
      http_api_id:
        default: your-dashboard-http-api-id
      region:
        default: your-region
      stage:
        default: prod
security:
  - walletProof: []
tags:
  - name: pricing
    description: Storage price quote operations
  - name: payments
    description: Payment settlement operations
  - name: storage
    description: Wallet-scoped storage object operations
  - name: marketplace-lite
    description: Marketplace-friendly storage facade (mnemospark-lite) operations
  - name: dashboard
    description: Internal Ops Console (dashboard v2) read-only GraphQL transport
paths:
  /price-storage:
    post:
      tags: [pricing]
      summary: Create a storage price quote
      description: >
        Calculates storage pricing and returns a quote for a wallet-scoped object.
        Deploy-time configuration uses Lambda environment variables `PRICE_STORAGE_FLOOR`
        (minimum USD subtotal before markup) and `PRICE_STORAGE_MARKUP` (markup percent);
        see `docs/price-storage.md`.
      operationId: postPriceStorage
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceStorageRequest"
      responses:
        "200":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceStorageResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /payment/settle:
    post:
      tags: [payments]
      summary: Verify and settle storage payment (quote or monthly renewal)
      description: >
        Two modes: (1) **Quote settlement** after price-storage: requires `quote_id`
        and a valid quote row. (2) **Monthly renewal**: `renewal: true` and
        `object_key`; uses active storage inventory for price and S3 head check;
        writes `RENEWAL_TRANSACTION_LOG` with a synthetic ledger `quote_id`
        `renewal#YYYY-MM#<url_safe_object_key>` (UTC month). Both modes use the same
        x402 / EIP-712 flow. Errors may include `renewal_not_registered` or
        `object_not_in_storage` (404) for renewal mode.
      operationId: postPaymentSettle
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/PaymentSignatureHeader"
        - $ref: "#/components/parameters/XPaymentHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentSettleRequest"
      responses:
        "200":
          description: Payment settled and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettleResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "402":
          $ref: "#/components/responses/PaymentRequiredError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/upload:
    post:
      tags: [storage]
      summary: Upload object ciphertext or request presigned upload URL
      description: >
        Accepts encrypted payload metadata and either uploads inline ciphertext
        or returns a presigned URL flow depending on mode.
      operationId: postStorageUpload
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/PaymentSignatureHeader"
        - $ref: "#/components/parameters/XPaymentHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageUploadRequest"
      responses:
        "200":
          description: Upload accepted or completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadResponse"
        "207":
          description: Payment settled but upload needs retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "402":
          $ref: "#/components/responses/PaymentRequiredError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/upload/confirm:
    post:
      tags: [storage]
      summary: Confirm presigned upload completion
      description: Confirms presigned upload object existence and finalizes transaction state.
      operationId: postStorageUploadConfirm
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadConfirmRequest"
      responses:
        "200":
          description: Upload confirmation finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/ls:
    get:
      tags: [storage]
      summary: Stat or list wallet bucket objects
      description: >
        With `object_key`, returns metadata for that key (head_object). Without
        `object_key`, lists object keys in the wallet bucket via S3 ListObjectsV2
        (paginated).
      operationId: getStorageLs
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/WalletAddressQuery"
        - $ref: "#/components/parameters/StorageLsObjectKeyQuery"
        - $ref: "#/components/parameters/LocationQuery"
        - $ref: "#/components/parameters/StorageLsContinuationTokenQuery"
        - $ref: "#/components/parameters/StorageLsMaxKeysQuery"
        - $ref: "#/components/parameters/StorageLsPrefixQuery"
      responses:
        "200":
          description: Stat (single object) or list response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StorageLsStatResponse"
                  - $ref: "#/components/schemas/StorageLsListResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [storage]
      summary: Stat or list wallet bucket objects (JSON body)
      description: >
        Same semantics as GET. `object_key` optional; omit for list mode.
        Optional `continuation_token`, `max_keys` (1–1000), and `prefix`.
      operationId: postStorageLs
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageLsRequest"
      responses:
        "200":
          description: Stat (single object) or list response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StorageLsStatResponse"
                  - $ref: "#/components/schemas/StorageLsListResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/ls-web/session:
    post:
      tags: [storage]
      summary: Mint ls-web session (CLI / wallet proof)
      description: >
        Creates a 6-hour browser session for `https://app.mnemospark.ai`: stores wallet and
        region in DynamoDB, returns a single-use opaque `code`, `app` URL with `?code=`,
        and `expires_at`. Requires `X-Wallet-Signature` (same wallet-proof flow as other
        storage routes). No delete surface for ls-web callers.
      operationId: postStorageLsWebSession
      security:
        - walletProof: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageLsWebSessionRequest"
      responses:
        "200":
          description: Exchange code and app URL minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageLsWebSessionMintResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/ls-web/exchange:
    post:
      tags: [storage]
      summary: Exchange one-time code for HttpOnly session cookie
      description: >
        Validates `code`, marks it consumed, and returns `Set-Cookie` for `mnemospark_ls_web`
        (HttpOnly, Secure, Domain=.mnemospark.ai, Path=/, SameSite=Lax). CORS uses
        `https://app.mnemospark.ai` with credentials. Does not use `X-Wallet-Signature`.
      operationId: postStorageLsWebExchange
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageLsWebExchangeRequest"
      responses:
        "200":
          description: Cookie issued
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageLsWebExchangeResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          description: Invalid or reused code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/ls-web/list:
    post:
      tags: [storage]
      summary: List wallet bucket (ls-web session cookie)
      description: >
        Same S3 list semantics as POST `/storage/ls` list mode; wallet comes from the
        session row. Requires `mnemospark_ls_web` cookie from `/storage/ls-web/exchange`.
        POST-only for uniform CSRF posture with exchange/download.
      operationId: postStorageLsWebList
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageLsWebListRequest"
      responses:
        "200":
          description: List response (subset compatible with StorageLsListResponse)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageLsListResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          description: Missing or expired session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/ls-web/download:
    post:
      tags: [storage]
      summary: Batch presigned GET URLs (ls-web session cookie)
      description: >
        Up to 25 `object_keys` per request; each key must exist in the wallet bucket and
        obey single-segment rules like `/storage/download`. `expires_in_seconds` optional
        (1–3600, default from `STORAGE_DOWNLOAD_URL_TTL_SECONDS`). Returns per-key results
        with `url` and `expires_at` or `error` / `message` on failure.
      operationId: postStorageLsWebDownload
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageLsWebDownloadRequest"
      responses:
        "200":
          description: Presigned URLs per object key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageLsWebDownloadBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          description: Missing or expired session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/download:
    get:
      tags: [storage]
      summary: Create presigned download URL
      description: Generates a short-lived presigned URL for object download.
      operationId: getStorageDownload
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/WalletAddressQuery"
        - $ref: "#/components/parameters/ObjectKeyQuery"
        - $ref: "#/components/parameters/LocationQuery"
        - $ref: "#/components/parameters/ExpiresInSecondsQuery"
      responses:
        "200":
          description: Presigned download URL created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "405":
          description: Method not allowed (only GET and POST are supported)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [storage]
      summary: Create presigned download URL (JSON body variant)
      description: POST variant of /storage/download using JSON body payload.
      operationId: postStorageDownload
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/StorageObjectRequest"
                - type: object
                  properties:
                    expires_in_seconds:
                      type: integer
                      minimum: 1
                      maximum: 3600
      responses:
        "200":
          description: Presigned download URL created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "405":
          description: Method not allowed (only GET and POST are supported)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /storage/delete:
    delete:
      tags: [storage]
      summary: Delete object from wallet bucket
      description: Deletes object and removes bucket when it becomes empty.
      operationId: deleteStorageObject
      security:
        - walletProof: []
      parameters:
        - $ref: "#/components/parameters/WalletAddressQuery"
        - $ref: "#/components/parameters/ObjectKeyQuery"
        - $ref: "#/components/parameters/LocationQuery"
      responses:
        "200":
          description: Object deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDeleteResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [storage]
      summary: Delete object (JSON body variant)
      description: POST variant of /storage/delete using JSON body payload.
      operationId: postStorageDelete
      security:
        - walletProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageObjectRequest"
      responses:
        "200":
          description: Object deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDeleteResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /graphql:
    post:
      tags: [dashboard]
      summary: Execute GraphQL operation (dashboard v2)
      description: >
        Standard GraphQL-over-HTTP POST. Field-level types and operations are defined in
        `services/dashboard_graphql/schema.graphql` (Strawberry), including dashboard
        analytics queries (events, wallets, quote funnel, health, trace) for Ops Console v2.
        This operation documents the HTTP envelope only. The API is deployed on a **separate** API Gateway HTTP API
        from the customer REST API; use the **dashboardGraphqlHttpApi** server entry.
      operationId: postDashboardGraphql
      servers:
        - url: https://{http_api_id}.execute-api.{region}.amazonaws.com/{stage}
          variables:
            http_api_id:
              default: your-dashboard-http-api-id
            region:
              default: your-region
            stage:
              default: prod
      security:
        - dashboardApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardGraphqlRequest"
      responses:
        "200":
          description: GraphQL response (data and/or errors)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardGraphqlResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          description: Missing or invalid x-api-key (Lambda authorizer + Secrets Manager).
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    options:
      tags: [dashboard]
      summary: CORS preflight for GraphQL
      description: >
        API Gateway may handle OPTIONS; the Lambda also returns 204 with CORS headers for
        `/graphql` preflight when integrated.
      operationId: optionsDashboardGraphql
      servers:
        - url: https://{http_api_id}.execute-api.{region}.amazonaws.com/{stage}
          variables:
            http_api_id:
              default: your-dashboard-http-api-id
            region:
              default: your-region
            stage:
              default: prod
      security: []
      responses:
        "204":
          description: No content (CORS preflight)

  /api/mnemospark-lite/upload:
    post:
      tags: [marketplace-lite]
      summary: Create a paid upload slot (mnemospark-lite)
      description: >
        Paid x402 entrypoint that returns a presigned PUT URL (`uploadUrl`) and upload metadata.
        Default flow is two-step: `publicUrl`/`siteUrl` are null until `/api/mnemospark-lite/upload/complete`.
        Hard max size is 4.8 GB (no multipart uploads in v1).
        Pricing is **tier-based**: clients should include `tier` in the request body and (when unauthenticated)
        first call without payment to receive a `402` with a tier-specific `PAYMENT-REQUIRED` challenge, then pay
        the exact advertised `accepts[0].amount`.
      operationId: postMnemosparkLiteUpload
      security: []
      parameters:
        - $ref: "#/components/parameters/PaymentSignatureHeader"
        - $ref: "#/components/parameters/XPaymentHeader"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MnemosparkLiteUploadRequest"
      responses:
        "200":
          description: Upload slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MnemosparkLiteUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "402":
          $ref: "#/components/responses/PaymentRequiredError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/mnemospark-lite/upload/complete:
    post:
      tags: [marketplace-lite]
      summary: Complete upload and mint share URL (mnemospark-lite)
      description: >
        Free completion step after PUT: performs S3 HEAD reconciliation, enforces size limits,
        and mints the ls-web app-entry share URL (`publicUrl`/`siteUrl`).
      operationId: postMnemosparkLiteUploadComplete
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MnemosparkLiteUploadCompleteRequest"
      responses:
        "200":
          description: Upload completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MnemosparkLiteUploadCompleteResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          description: Invalid or expired completion token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/mnemospark-lite/uploads:
    get:
      tags: [marketplace-lite]
      summary: List uploads for the payer wallet (mnemospark-lite)
      description: >
        Wallet-scoped listing endpoint for agents. Requires a bearer/JWT issued from the paid upload flow.
      operationId: getMnemosparkLiteUploads
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Uploads listed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MnemosparkLiteUploadsResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/mnemospark-lite/download/{uploadId}:
    get:
      tags: [marketplace-lite]
      summary: Get upload detail and optional presigned download (mnemospark-lite)
      description: >
        Wallet-scoped detail endpoint for agents. Requires bearer/JWT and returns an UploadRecord;
        may include a short-lived presigned GET URL when status is uploaded.
      operationId: getMnemosparkLiteDownload
      security:
        - bearerAuth: []
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload detail returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MnemosparkLiteDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/mnemospark-lite/share:
    post:
      tags: [marketplace-lite]
      summary: Mint a 24-hour share URL for an upload (mnemospark-lite)
      description: >
        Owner-scoped share mint endpoint for the mnemospark-lite web shell. Accepts either
        the lite bearer token (`Authorization: Bearer ...`) or an active `mnemospark_ls_web`
        session cookie (bucket_mode=lite). Returns an app URL with `?share=...` that can be
        redeemed for a short-lived presigned GET until the 24-hour share token expires.
      operationId: postMnemosparkLiteShare
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MnemosparkLiteShareRequest"
      responses:
        "200":
          description: Share URL minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MnemosparkLiteShareResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Conflict (upload not uploaded yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/mnemospark-lite/shares/exchange:
    post:
      tags: [marketplace-lite]
      summary: Exchange a share token for a presigned download URL (mnemospark-lite)
      description: >
        Public endpoint: anyone with the `share_token` can redeem it until it expires (24 hours).
        Returns a short-lived presigned GET URL for the underlying S3 object.
      operationId: postMnemosparkLiteSharesExchange
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MnemosparkLiteSharesExchangeRequest"
      responses:
        "200":
          description: Presigned download URL issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MnemosparkLiteSharesExchangeResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          description: Invalid or expired share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/mnemospark-lite/delete:
    post:
      tags: [marketplace-lite]
      summary: Delete one or more uploads (mnemospark-lite)
      description: >
        Owner-scoped delete endpoint for the mnemospark-lite web shell. Accepts either the
        lite bearer token (`Authorization: Bearer ...`) or an active `mnemospark_ls_web`
        session cookie (bucket_mode=lite). Deletes the underlying S3 object and removes the
        upload registry row so it no longer appears in listings.
      operationId: postMnemosparkLiteDelete
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MnemosparkLiteDeleteRequest"
      responses:
        "200":
          description: Delete results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MnemosparkLiteDeleteResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    walletProof:
      type: apiKey
      in: header
      name: X-Wallet-Signature
      description: >
        Wallet proof authentication. The client proves control of a wallet by signing
        a structured request payload (EIP-712 MnemosparkRequest: method, path,
        walletAddress, nonce, timestamp) and sending the result in this header.
        The header value is base64-encoded JSON with payloadB64, signature, and address.
        The backend verifies the EIP-712 signature and rejects requests with missing,
        malformed, or invalid proofs (403). Required for all wallet-scoped endpoints.

    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Bearer token used by mnemospark-lite marketplace facade read endpoints.
        Issued by the backend after a successful paid upload call and scoped to the payer wallet.

    dashboardApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: >
        Shared secret for the dashboard GraphQL HTTP API. The Lambda authorizer validates
        this header against the current value in AWS Secrets Manager (plaintext or JSON with
        api_key, apiKey, or api_key_dashboard). Prefer a server-side proxy (Next.js route) or Tailscale; do not
        expose the key in public client bundles.

  parameters:
    WalletAddressQuery:
      name: wallet_address
      in: query
      required: true
      schema:
        type: string
      description: Wallet address that scopes access to object operations.
    ObjectKeyQuery:
      name: object_key
      in: query
      required: true
      schema:
        type: string
      description: Wallet-scoped object key (single path segment).
    StorageLsObjectKeyQuery:
      name: object_key
      in: query
      required: false
      schema:
        type: string
      description: >
        Object key for stat mode (single path segment). Omit to list all keys
        in the wallet bucket (S3 list).
    StorageLsContinuationTokenQuery:
      name: continuation_token
      in: query
      required: false
      schema:
        type: string
      description: S3 list pagination continuation token (list mode only).
    StorageLsMaxKeysQuery:
      name: max_keys
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
      description: Maximum keys per list page (default 1000, capped at 1000).
    StorageLsPrefixQuery:
      name: prefix
      in: query
      required: false
      schema:
        type: string
      description: Optional S3 key prefix filter (list mode only).
    LocationQuery:
      name: location
      in: query
      required: false
      schema:
        type: string
      description: Optional AWS region/location override.
    ExpiresInSecondsQuery:
      name: expires_in_seconds
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 3600
      description: Presigned download URL TTL in seconds.
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Optional idempotency key for upload request deduplication.
    PaymentSignatureHeader:
      name: PAYMENT-SIGNATURE
      in: header
      required: false
      schema:
        type: string
      description: Optional payment authorization envelope.
    XPaymentHeader:
      name: x-payment
      in: header
      required: false
      schema:
        type: string
      description: Optional payment authorization envelope alternate header.

  responses:
    BadRequestError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Wallet proof validation or authorization failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Referenced quote, bucket, or object not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Idempotency or state conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PaymentRequiredError:
      description: Payment authorization is required or invalid.
      headers:
        PAYMENT-REQUIRED:
          description: >
            Base64-encoded JSON payment requirements challenge (x402). Includes `accepts` and may include
            discovery metadata (for Bazaar) under `extensions` along with descriptive fields like `resource`,
            `mimeType`, and `description`.
          schema:
            type: string
        x-payment-required:
          description: Alias of `PAYMENT-REQUIRED`.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unhandled internal error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    DashboardGraphqlRequest:
      type: object
      description: Standard GraphQL-over-HTTP JSON body.
      properties:
        query:
          type: string
          description: GraphQL query or mutation document.
        variables:
          type: object
          additionalProperties: true
          nullable: true
          description: Optional variables map for the operation.
        operationName:
          type: string
          nullable: true
          description: Optional operation name when the document defines multiple operations.
      required:
        - query

    DashboardGraphqlResponse:
      type: object
      description: >
        GraphQL response envelope. The `data` shape depends on the operation; see the SDL
        in `services/dashboard_graphql/schema.graphql`.
      properties:
        data:
          type: object
          additionalProperties: true
          nullable: true
        errors:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/DashboardGraphqlError"
      additionalProperties: true

    DashboardGraphqlError:
      type: object
      properties:
        message:
          type: string
        locations:
          type: array
          items:
            type: object
            additionalProperties: true
        path:
          type: array
          items: {}
        extensions:
          type: object
          additionalProperties: true
      required:
        - message

    PriceStorageRequest:
      type: object
      required:
        - wallet_address
        - object_id
        - object_id_hash
        - gb
        - provider
        - region
      properties:
        wallet_address:
          type: string
        object_id:
          type: string
        object_id_hash:
          type: string
        gb:
          type: number
          minimum: 0
          exclusiveMinimum: 0
          description: Storage size in GB; must be greater than 0.
        provider:
          type: string
          description: Currently expected as "aws".
        region:
          type: string

    StorageUploadRequest:
      type: object
      required:
        - quote_id
        - wallet_address
        - object_id
        - object_id_hash
        - wrapped_dek
      properties:
        quote_id:
          type: string
        wallet_address:
          type: string
        object_id:
          type: string
        object_id_hash:
          type: string
        object_key:
          type: string
          description: Optional override for object_id.
        mode:
          type: string
          enum: [inline, presigned]
          description: Inline uploads include ciphertext; presigned returns upload URL.
        ciphertext:
          type: string
          description: Base64-encoded encrypted content for inline mode.
        wrapped_dek:
          type: string
          description: Base64-encoded wrapped DEK metadata.
        content_sha256:
          type: string
        content_length_bytes:
          type: integer
          minimum: 0
        provider:
          type: string
        location:
          type: string

    PaymentSettleQuoteRequest:
      type: object
      required:
        - wallet_address
        - quote_id
      properties:
        wallet_address:
          type: string
        quote_id:
          type: string
        payment:
          type: object
          description: Inline payment authorization payload.
        payment_authorization:
          oneOf:
            - type: object
            - type: string
          description: Alternate inline payment authorization envelope.

    PaymentSettleRenewalRequest:
      type: object
      required:
        - wallet_address
        - renewal
        - object_key
      properties:
        wallet_address:
          type: string
        renewal:
          const: true
        object_key:
          type: string
        payment:
          type: object
        payment_authorization:
          oneOf:
            - type: object
            - type: string

    PaymentSettleRequest:
      oneOf:
        - $ref: "#/components/schemas/PaymentSettleQuoteRequest"
        - $ref: "#/components/schemas/PaymentSettleRenewalRequest"

    UploadConfirmRequest:
      type: object
      required:
        - wallet_address
        - object_key
        - idempotency_key
        - quote_id
      properties:
        wallet_address:
          type: string
        object_key:
          type: string
        idempotency_key:
          type: string
        quote_id:
          type: string

    StorageObjectRequest:
      type: object
      required:
        - wallet_address
        - object_key
      properties:
        wallet_address:
          type: string
        object_key:
          type: string
        location:
          type: string

    StorageLsRequest:
      type: object
      required:
        - wallet_address
      properties:
        wallet_address:
          type: string
        object_key:
          type: string
          description: Omit for list mode.
        location:
          type: string
        continuation_token:
          type: string
        max_keys:
          type: integer
          minimum: 1
          maximum: 1000
        prefix:
          type: string

    StorageLsWebSessionRequest:
      type: object
      properties:
        location:
          type: string
          description: AWS region for subsequent S3 list/download (defaults to Lambda region).

    StorageLsWebSessionMintResponse:
      type: object
      required:
        - success
        - code
        - app
        - expires_at
      properties:
        success:
          type: boolean
        code:
          type: string
          description: Single-use opaque exchange code (plaintext once; server stores SHA-256 only).
        app:
          type: string
          format: uri
          description: Entry URL for the web app, typically `https://app.mnemospark.ai/?code=...`.
        expires_at:
          type: string
          description: ISO 8601 UTC; session TTL is 6 hours from mint.

    StorageLsWebExchangeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string

    StorageLsWebExchangeResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean

    StorageLsWebListRequest:
      type: object
      properties:
        continuation_token:
          type: string
        max_keys:
          type: integer
          minimum: 1
          maximum: 1000
        prefix:
          type: string
        location:
          type: string

    StorageLsWebDownloadRequest:
      type: object
      required:
        - object_keys
      properties:
        object_keys:
          type: array
          minItems: 1
          maxItems: 25
          items:
            type: string
        expires_in_seconds:
          type: integer
          minimum: 1
          maximum: 3600
        location:
          type: string

    StorageLsWebDownloadResultSuccess:
      type: object
      required:
        - object_key
        - url
        - expires_at
      properties:
        object_key:
          type: string
        url:
          type: string
          format: uri
        expires_at:
          type: string

    StorageLsWebDownloadResultError:
      type: object
      required:
        - object_key
        - error
        - message
      properties:
        object_key:
          type: string
        error:
          type: string
        message:
          type: string

    StorageLsWebDownloadBatchResponse:
      type: object
      required:
        - success
        - results
      properties:
        success:
          type: boolean
        results:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/StorageLsWebDownloadResultSuccess"
              - $ref: "#/components/schemas/StorageLsWebDownloadResultError"

    PriceStorageResponse:
      type: object
      properties:
        timestamp:
          type: string
        quote_id:
          type: string
        storage_price:
          type: number
        addr:
          type: string
        object_id:
          type: string
        object_id_hash:
          type: string
        object_size_gb:
          type: number
        provider:
          type: string
        location:
          type: string
      required:
        - quote_id
        - storage_price
        - addr
        - object_id
        - provider
        - location

    StorageUploadResponse:
      type: object
      properties:
        quote_id:
          type: string
        addr:
          type: string
        addr_hash:
          type: string
        trans_id:
          type: string
        storage_price:
          type: number
        object_id:
          type: string
        object_key:
          type: string
        provider:
          type: string
        bucket_name:
          type: string
        location:
          type: string
        upload_url:
          type: string
          format: uri
        upload_headers:
          type: object
          additionalProperties:
            type: string
        confirmation_required:
          type: boolean
        upload_failed:
          type: boolean
        error:
          type: string

    PaymentSettleResponse:
      type: object
      required:
        - quote_id
        - wallet_address
        - trans_id
        - network
        - asset
        - amount
        - payment_status
        - timestamp
      properties:
        quote_id:
          type: string
          description: Upload quote UUID or synthetic renewal id for the payment ledger.
        wallet_address:
          type: string
        trans_id:
          type: string
        network:
          type: string
        asset:
          type: string
        amount:
          type: string
        payment_status:
          type: string
          enum: [confirmed]
        timestamp:
          type: string
        result:
          type: string
          enum: [already_settled]
          description: Present on idempotent retries (quote or renewal log duplicate).
        renewal:
          type: boolean
        object_key:
          type: string
        billing_period:
          type: string
          description: UTC YYYY-MM for renewal responses.

    StorageLsStatResponse:
      type: object
      required:
        - success
        - key
        - size_bytes
        - bucket
      properties:
        success:
          type: boolean
        key:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        bucket:
          type: string

    StorageLsListObject:
      type: object
      required:
        - key
        - size_bytes
      properties:
        key:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        last_modified:
          type: string
          description: ISO 8601 UTC timestamp when present (from S3 LastModified).

    StorageLsListResponse:
      type: object
      required:
        - success
        - list_mode
        - bucket
        - objects
        - is_truncated
      properties:
        success:
          type: boolean
        list_mode:
          type: boolean
          enum: [true]
        bucket:
          type: string
        objects:
          type: array
          items:
            $ref: "#/components/schemas/StorageLsListObject"
        is_truncated:
          type: boolean
        next_continuation_token:
          type: string
          nullable: true

    StorageLsResponse:
      description: Deprecated alias; use StorageLsStatResponse for single-object stat.
      allOf:
        - $ref: "#/components/schemas/StorageLsStatResponse"

    StorageDownloadResponse:
      type: object
      required:
        - download_url
        - object_key
        - expires_in_seconds
      properties:
        download_url:
          type: string
          format: uri
        object_key:
          type: string
        expires_in_seconds:
          type: integer
          minimum: 1
          maximum: 3600

    StorageDeleteResponse:
      type: object
      required:
        - success
        - key
        - bucket
        - bucket_deleted
      properties:
        success:
          type: boolean
        key:
          type: string
        bucket:
          type: string
        bucket_deleted:
          type: boolean

    MnemosparkLiteUploadRequest:
      type: object
      required:
        - filename
        - contentType
        - tier
        - size_bytes
      properties:
        filename:
          type: string
          description: Object key (single path segment).
        contentType:
          type: string
          description: MIME type for the upload.
        tier:
          type: string
          description: Tier identifier (e.g. 10mb, 100mb, 500mb, 1gb, 2gb, 3gb).
        size_bytes:
          type: integer
          minimum: 0
          description: Intended upload size in bytes. Must be <= 4_800_000_000.

    MnemosparkLiteUploadResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          required:
            - uploadId
            - uploadUrl
            - publicUrl
            - siteUrl
            - expiresAt
            - maxSize
            - curlExample
            - completion_token
            - list_scope_bearer
          properties:
            uploadId:
              type: string
            uploadUrl:
              type: string
              format: uri
            publicUrl:
              type: string
              nullable: true
              description: Null until /upload/complete mints the ls-web share URL.
            siteUrl:
              type: string
              nullable: true
              description: Alias of publicUrl (same string) once minted.
            expiresAt:
              type: string
              description: >
                ISO time when the object becomes eligible for deletion under S3 lifecycle (Days=30).
                AWS may delete any time after this.
            maxSize:
              type: integer
              description: Tier cap in bytes.
            curlExample:
              type: string
            completion_token:
              type: string
            list_scope_bearer:
              type: string
              description: Bearer token scoped to payer wallet for list/detail APIs.
        metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional payment metadata (protocol, network, price, payment.transactionHash).

    MnemosparkLiteUploadCompleteRequest:
      type: object
      required:
        - uploadId
        - completion_token
      properties:
        uploadId:
          type: string
        completion_token:
          type: string

    MnemosparkLiteUploadRecord:
      type: object
      required:
        - id
        - filename
        - contentType
        - tier
        - maxSize
        - actualSize
        - publicUrl
        - status
        - pricePaid
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
        filename:
          type: string
        contentType:
          type: string
        tier:
          type: string
        maxSize:
          type: integer
        actualSize:
          type: integer
          nullable: true
        publicUrl:
          type: string
          nullable: true
        status:
          type: string
        pricePaid:
          type: string
          nullable: true
        expiresAt:
          type: string
        createdAt:
          type: string

    MnemosparkLiteUploadCompleteResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          required:
            - upload
          properties:
            upload:
              $ref: "#/components/schemas/MnemosparkLiteUploadRecord"

    MnemosparkLiteUploadsResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          required:
            - uploads
          properties:
            uploads:
              type: array
              items:
                $ref: "#/components/schemas/MnemosparkLiteUploadRecord"

    MnemosparkLiteDownloadResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          required:
            - upload
          properties:
            upload:
              allOf:
                - $ref: "#/components/schemas/MnemosparkLiteUploadRecord"
                - type: object
                  properties:
                    downloadUrl:
                      type: string
                      nullable: true
                      format: uri
                      description: Optional short-lived presigned GET URL when status is uploaded.

    MnemosparkLiteShareRequest:
      type: object
      required:
        - uploadId
      properties:
        uploadId:
          type: string

    MnemosparkLiteShareResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          required:
            - uploadId
            - shareUrl
            - expiresAt
          properties:
            uploadId:
              type: string
            shareUrl:
              type: string
              format: uri
            expiresAt:
              type: string

    MnemosparkLiteSharesExchangeRequest:
      type: object
      required:
        - share_token
      properties:
        share_token:
          type: string

    MnemosparkLiteSharesExchangeResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          required:
            - filename
            - downloadUrl
            - shareExpiresAt
            - downloadExpiresInSeconds
          properties:
            filename:
              type: string
            downloadUrl:
              type: string
              format: uri
            shareExpiresAt:
              type: string
            downloadExpiresInSeconds:
              type: integer

    MnemosparkLiteDeleteRequest:
      type: object
      required:
        - uploadIds
      properties:
        uploadIds:
          type: array
          items:
            type: string

    MnemosparkLiteDeleteResult:
      type: object
      required:
        - uploadId
        - success
      properties:
        uploadId:
          type: string
        success:
          type: boolean
        error:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        details:
          type: object
          nullable: true

    MnemosparkLiteDeleteResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          required:
            - deleted
            - results
          properties:
            deleted:
              type: integer
            results:
              type: array
              items:
                $ref: "#/components/schemas/MnemosparkLiteDeleteResult"

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          description: Optional structured or string detail.
