name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA validated in staging
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aws-sam-cli

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy (prod)
        env:
          DASHBOARD_SECRET_ARN: ${{ vars.DASHBOARD_GRAPHQL_API_KEY_SECRET_ARN }}
        run: |
          if [ -z "${DASHBOARD_SECRET_ARN}" ]; then
            echo "::error::Set DASHBOARD_GRAPHQL_API_KEY_SECRET_ARN in the production GitHub environment (Secrets Manager ARN for dashboard GraphQL x-api-key)."
            exit 1
          fi
          sam deploy --config-file samconfig.prod.toml \
            --region "${{ vars.AWS_REGION }}" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "StageName=prod DashboardGraphqlApiKeySecretArn=${DASHBOARD_SECRET_ARN} PriceStorageFloor=${{ vars.PRICE_STORAGE_FLOOR || '0' }} PriceStorageMarkup=${{ vars.PRICE_STORAGE_MARKUP || '0' }}"

      - name: Smoke tests (prod)
        if: ${{ vars.PROD_BASE_URL != '' && !contains(vars.PROD_BASE_URL, 'example.com') }}
        run: bash scripts/smoke.sh "${{ vars.PROD_BASE_URL }}"

      - name: Smoke tests skipped (placeholder URL)
        if: ${{ vars.PROD_BASE_URL == '' || contains(vars.PROD_BASE_URL, 'example.com') }}
        run: echo "Skipping smoke tests because PROD_BASE_URL is placeholder or unset."
