name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA validated in staging
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aws-sam-cli

      - name: Verify AWS_REGION
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "::error::AWS_REGION is not set for this job. The Promote workflow uses the **prod** GitHub environment; environment-scoped variables from **staging** are not visible here. Add **AWS_REGION** under Settings â†’ Environments â†’ **prod** â†’ Environment variables (same region as the prod stack, e.g. us-east-1), or define **AWS_REGION** as a repository Actions variable (Settings â†’ Secrets and variables â†’ Actions â†’ Variables)."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy (prod)
        env:
          PAYMENT_SETTLEMENT_MODE: ${{ vars.PAYMENT_SETTLEMENT_MODE }}
          BASE_RPC_URL: ${{ vars.BASE_RPC_URL }}
          MNEMOSPARK_RECIPIENT_WALLET: ${{ vars.MNEMOSPARK_RECIPIENT_WALLET }}
          RELAYER_WALLET_ADDRESS: ${{ vars.RELAYER_WALLET_ADDRESS }}
          PAYMENT_ASSET_ADDRESS: ${{ vars.PAYMENT_ASSET_ADDRESS }}
          MNEMOSPARK_LITE_PUBLIC_BASE_URL: ${{ vars.MnemosparkLitePublicBaseUrl }}
          PRICE_STORAGE_FLOOR: ${{ vars.PRICE_STORAGE_FLOOR || '0' }}
          PRICE_STORAGE_MARKUP: ${{ vars.PRICE_STORAGE_MARKUP || '0' }}
        run: |
          set -euo pipefail
          require_var() {
            local gh_name="$1"
            local val="${2:-}"
            if [ -z "${val}" ]; then
              echo "::error::Set GitHub variable ${gh_name} on the prod GitHub environment."
              exit 1
            fi
          }
          require_var PAYMENT_SETTLEMENT_MODE "${PAYMENT_SETTLEMENT_MODE}"
          require_var MNEMOSPARK_RECIPIENT_WALLET "${MNEMOSPARK_RECIPIENT_WALLET}"
          require_var RELAYER_WALLET_ADDRESS "${RELAYER_WALLET_ADDRESS}"
          require_var PAYMENT_ASSET_ADDRESS "${PAYMENT_ASSET_ADDRESS}"
          require_var MnemosparkLitePublicBaseUrl "${MNEMOSPARK_LITE_PUBLIC_BASE_URL}"
          if [ "${PAYMENT_SETTLEMENT_MODE}" = "onchain" ]; then
            require_var BASE_RPC_URL "${BASE_RPC_URL}"
          fi
          sam deploy --config-file samconfig.prod.toml \
            --region "${{ vars.AWS_REGION }}" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "StageName=prod" \
              "PaymentSettlementMode=${PAYMENT_SETTLEMENT_MODE}" \
              "BaseRpcUrl=${BASE_RPC_URL}" \
              "MnemosparkRecipientWallet=${MNEMOSPARK_RECIPIENT_WALLET}" \
              "RelayerWalletAddress=${RELAYER_WALLET_ADDRESS}" \
              "PaymentAssetAddress=${PAYMENT_ASSET_ADDRESS}" \
              "PriceStorageFloor=${PRICE_STORAGE_FLOOR}" \
              "PriceStorageMarkup=${PRICE_STORAGE_MARKUP}" \
              "MnemosparkLitePublicBaseUrl=${MNEMOSPARK_LITE_PUBLIC_BASE_URL}"

      - name: Smoke tests (prod)
        if: ${{ vars.PROD_BASE_URL != '' && !contains(vars.PROD_BASE_URL, 'example.com') }}
        run: bash scripts/smoke.sh "${{ vars.PROD_BASE_URL }}"

      - name: Smoke tests skipped (placeholder URL)
        if: ${{ vars.PROD_BASE_URL == '' || contains(vars.PROD_BASE_URL, 'example.com') }}
        run: echo "Skipping smoke tests because PROD_BASE_URL is placeholder or unset."
