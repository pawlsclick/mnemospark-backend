name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aws-sam-cli pytest

      - name: Unit tests
        run: pytest -q

      - name: Verify AWS_REGION
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "::error::AWS_REGION is not set. Add it under Settings → Environments → **staging** → Environment variables, or as a repository Actions variable (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy (staging)
        env:
          PAYMENT_SETTLEMENT_MODE: ${{ vars.PAYMENT_SETTLEMENT_MODE }}
          BASE_RPC_URL: ${{ vars.BASE_RPC_URL }}
          MNEMOSPARK_RECIPIENT_WALLET: ${{ vars.MNEMOSPARK_RECIPIENT_WALLET }}
          RELAYER_WALLET_ADDRESS: ${{ vars.RELAYER_WALLET_ADDRESS }}
          PAYMENT_ASSET_ADDRESS: ${{ vars.PAYMENT_ASSET_ADDRESS }}
          MNEMOSPARK_LITE_PUBLIC_BASE_URL: ${{ vars.MnemosparkLitePublicBaseUrl }}
          MNEMOSPARK_LITE_BEARER_SECRET: ${{ secrets.MNEMOSPARK_LITE_BEARER_SECRET }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
          PRICE_STORAGE_FLOOR: ${{ vars.PRICE_STORAGE_FLOOR || '0' }}
          PRICE_STORAGE_MARKUP: ${{ vars.PRICE_STORAGE_MARKUP || '0' }}
        run: |
          set -euo pipefail
          require_var() {
            local gh_name="$1"
            local val="${2:-}"
            local setting_type="${3:-variable}"
            if [ -z "${val}" ]; then
              echo "::error::Set GitHub ${setting_type} ${gh_name} on the staging environment."
              exit 1
            fi
          }
          require_var PAYMENT_SETTLEMENT_MODE "${PAYMENT_SETTLEMENT_MODE}"
          require_var MNEMOSPARK_RECIPIENT_WALLET "${MNEMOSPARK_RECIPIENT_WALLET}"
          require_var RELAYER_WALLET_ADDRESS "${RELAYER_WALLET_ADDRESS}"
          require_var PAYMENT_ASSET_ADDRESS "${PAYMENT_ASSET_ADDRESS}"
          require_var MnemosparkLitePublicBaseUrl "${MNEMOSPARK_LITE_PUBLIC_BASE_URL}"
          require_var MNEMOSPARK_LITE_BEARER_SECRET "${MNEMOSPARK_LITE_BEARER_SECRET}" secret
          require_var CDP_API_KEY_SECRET "${CDP_API_KEY_SECRET}" secret
          require_var CDP_API_KEY_ID "${CDP_API_KEY_ID}" secret
          if [ "${PAYMENT_SETTLEMENT_MODE}" = "onchain" ]; then
            require_var BASE_RPC_URL "${BASE_RPC_URL}"
          fi
          # ls-web: set RestApiCorsAllowOrigin for Lambda MNEMOSPARK_CORS_ALLOW_ORIGIN. API Gateway
          # AllowHeaders/AllowOrigin for staging are inlined in template.yaml (IsStagingStage) because
          # sam deploy --parameter-overrides splits on commas inside values.
          sam deploy --config-file samconfig.staging.toml \
            --region "${{ vars.AWS_REGION }}" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "StageName=staging" \
              "PaymentSettlementMode=${PAYMENT_SETTLEMENT_MODE}" \
              "BaseRpcUrl=${BASE_RPC_URL}" \
              "MnemosparkRecipientWallet=${MNEMOSPARK_RECIPIENT_WALLET}" \
              "RelayerWalletAddress=${RELAYER_WALLET_ADDRESS}" \
              "PaymentAssetAddress=${PAYMENT_ASSET_ADDRESS}" \
              "MnemosparkLiteBearerSecret=${MNEMOSPARK_LITE_BEARER_SECRET}" \
              "CdpX402FacilitatorBearerToken=${CDP_API_KEY_SECRET}" \
              "CdpApiKeyId=${CDP_API_KEY_ID}" \
              "PriceStorageFloor=${PRICE_STORAGE_FLOOR}" \
              "PriceStorageMarkup=${PRICE_STORAGE_MARKUP}" \
              "MnemosparkLitePublicBaseUrl=${MNEMOSPARK_LITE_PUBLIC_BASE_URL}" \
              "RestApiCorsAllowOrigin=https://app.mnemospark.ai"

      - name: Smoke tests
        if: ${{ vars.STAGING_BASE_URL != '' && !contains(vars.STAGING_BASE_URL, 'example.com') }}
        run: bash scripts/smoke.sh "${{ vars.STAGING_BASE_URL }}"

      - name: Smoke tests skipped (placeholder URL)
        if: ${{ vars.STAGING_BASE_URL == '' || contains(vars.STAGING_BASE_URL, 'example.com') }}
        run: echo "Skipping smoke tests because STAGING_BASE_URL is placeholder or unset."
