  StorageHousekeepingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: services/storage-housekeeping
      Environment:
        Variables:
          UPLOAD_TRANSACTION_LOG_TABLE_NAME: !Ref UploadTransactionLogTable
          ACTIVE_STORAGE_OBJECT_TABLE_NAME: !Ref ActiveStorageObjectTable
          RENEWAL_TRANSACTION_LOG_TABLE_NAME: !Ref RenewalTransactionLogTable
          MNEMOSPARK_RECIPIENT_WALLET: !Ref MnemosparkRecipientWallet
          HOUSEKEEPING_MODE: !Ref HousekeepingMode
          HOUSEKEEPING_BILLING_INTERVAL_DAYS: !Ref HousekeepingBillingIntervalDays
          HOUSEKEEPING_GRACE_PERIOD_DAYS: !Ref HousekeepingGracePeriodDays
          HOUSEKEEPING_DRY_RUN: !Ref HousekeepingDryRun
          HOUSEKEEPING_RENEWAL_CHECK_HOUR_UTC: !Ref HousekeepingRenewalCheckHourUtc
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - s3:ListAllMyBuckets
              Resource: "*"
            - Effect: Allow
              Action:
                - dynamodb:Scan
                - dynamodb:DeleteItem
              Resource: !GetAtt UploadTransactionLogTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:GetItem
                - dynamodb:DeleteItem
              Resource:
                - !GetAtt ActiveStorageObjectTable.Arn
                - !Sub "${ActiveStorageObjectTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !GetAtt RenewalTransactionLogTable.Arn
                - !Sub "${RenewalTransactionLogTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - s3:ListBucket
                - s3:DeleteBucket
              Resource:
                - !Sub "arn:aws:s3:::mnemospark-*"
                - !Sub "arn:aws:s3:::mnemospark-lite-*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:DeleteObject
              Resource:
                - !Sub "arn:aws:s3:::mnemospark-*/*"
                - !Sub "arn:aws:s3:::mnemospark-lite-*/*"
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
                - kms:GenerateDataKey
              Resource: !GetAtt DynamoDbKmsKey.Arn

  StorageHousekeepingScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-storage-housekeeping"
      Description: >
        legacy_interval: upload-log scan (default rate(1 day)). renewal_calendar: set
        HousekeepingScheduleExpression to day-3 UTC cron and HOUSEKEEPING_MODE=renewal_calendar.
      ScheduleExpression: !Ref HousekeepingScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt StorageHousekeepingFunction.Arn
          Id: StorageHousekeepingLambdaTarget
      Tags:
        - Key: Project
          Value: mnemospark

  StorageHousekeepingInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StorageHousekeepingFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt StorageHousekeepingScheduleRule.Arn

  BaseRelayerMonitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: services/base-relayer-monitor
      Role: !GetAtt BaseRelayerMonitorLambdaRole.Arn
      Timeout: 120
      Description: Scheduled relayer wallet stats, health, runway, and SNS alerts.
      Environment:
        Variables:
          RELAYER_TRANSACTIONS_TABLE_NAME: !Ref RelayerTransactionsTable
          RELAYER_STATS_TABLE_NAME: !Ref RelayerStatsTable
          RELAYER_HEALTH_TABLE_NAME: !Ref RelayerHealthTable
          MNEMOSPARK_RELAYER_WALLET_ADDRESS: !Ref RelayerWalletAddress
          MNEMOSPARK_BASE_RPC_URL: !Ref BaseRpcUrl
          RELAYER_ALERTS_TOPIC_ARN: !Ref RelayerAlertsTopic

  BaseRelayerMonitorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-base-relayer-monitor"
      Description: Recompute relayer aggregates, health, and publish SNS alerts if needed.
      ScheduleExpression: !Ref RelayerMonitorScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt BaseRelayerMonitorFunction.Arn
