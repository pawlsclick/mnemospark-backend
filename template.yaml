          API_CALLS_TABLE_NAME: !Ref ApiCallsTable
      Events:
        DashboardGraphqlPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref DashboardGraphQLHttpApi
            Path: /graphql
            Method: POST
            Auth:
              Authorizer: DashboardGraphqlApiKeyAuthorizer
        DashboardGraphqlOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref DashboardGraphQLHttpApi
            Path: /graphql
            Method: OPTIONS
            Auth:
              Authorizer: NONE

