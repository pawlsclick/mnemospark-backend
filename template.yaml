AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  mnemospark-backend internet-facing REST API.
  Path-based routing to Lambda functions with wallet-proof Lambda authorizer auth, throttling,
  quota, request validation, CORS, and regional AWS WAFv2 on the REST API stage. Resources are tagged Project: mnemospark.

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: API Gateway stage name
  MnemosparkSecretsPathPrefix:
    Type: String
    Default: mnemospark
    Description: >-
      Secrets Manager name prefix for this stack. Dashboard GraphQL API key secret name
      is Prefix/StageName/dashboard-graphql-api-key; relayer private key is
      Prefix/StageName/relayer-private-key (slash-separated; StageName is the StageName parameter).
  ObservabilityLogRetentionDays:
    Type: Number
    Default: 30
    Description: Retention in days for API Gateway and Lambda log groups
  PriceStorageMarkup:
    Type: String
    Default: "0"
    Description: >
      Percent markup on the subtotal after the floor (PriceStorageFloor), e.g. 10 = 10%.
  PriceStorageQuoteTtlSeconds:
    Type: String
    Default: "3600"
    Description: Quote TTL in seconds for DynamoDB expiration
  PriceStorageFloor:
    Type: String
    Default: "0.01"
    Description: >
      Minimum USD for storage+transfer before markup. Default 0.01 keeps quotes settleable.
  WalletAuthEventsTtlSeconds:
    Type: String
    Default: "2592000"
    Description: TTL in seconds for wallet authorizer auth event records
  ApiCallsTtlSeconds:
    Type: String
    Default: "2592000"
    Description: TTL in seconds for API call logging records
  MnemosparkRecipientWallet:
    Type: String
    Default: ""
    Description: >-
      Recipient wallet address (0x...) for x402 USDC payments. Set per environment
      via parameter overrides; do not rely on template defaults for real funds.
  PaymentNetwork:
    Type: String
    Default: eip155:8453
    Description: CAIP-2 network identifier for payment verification
  PaymentAssetAddress:
    Type: String
    Default: ""
    Description: >-
      USDC (or payment asset) contract address for payment verification. Set per
      environment via parameter overrides.
  PaymentSettlementMode:
    Type: String
    AllowedValues:
      - mock
      - onchain
    Description: >-
      Payment settlement mode for upload flow. Pass mock or onchain explicitly per
      environment (no template default). mock: deterministic pseudo-tx IDs; onchain:
      real transfers on Base (requires BaseRpcUrl and relayer secret under MnemosparkSecretsPathPrefix).
  BaseRpcUrl:
    Type: String
    Description: >-
      Base chain RPC URL for on-chain settlement and relayer monitor. Required when
      PaymentSettlementMode is onchain; may be empty when mock (pass explicitly).
  RelayerPrivateKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Relayer private key used when PaymentSettlementMode is onchain
  HousekeepingScheduleExpression:
    Type: String
    Default: rate(1 day)
    Description: >
      EventBridge schedule for storage housekeeping. Use rate(1 day) with
      HousekeepingMode legacy_interval. For renewal_calendar use cron(0 12 3 * ? *)
      (3rd of month, 12:00 UTC).
  HousekeepingMode:
    Type: String
    Default: legacy_interval
    AllowedValues:
      - legacy_interval
      - renewal_calendar
    Description: >
      legacy_interval: 32-day scan of upload transaction log (default schedule rate(1 day)).
      renewal_calendar: require monthly renewal row; pair with cron on day 3 UTC.
  HousekeepingRenewalCheckHourUtc:
    Type: Number
    Default: 12
    Description: Hour (0-23 UTC) for renewal_calendar description only; encode in cron expression.
  HousekeepingBillingIntervalDays:
    Type: Number
    Default: 30
    Description: Billing interval in days before storage payment is due
  HousekeepingGracePeriodDays:
    Type: Number
    Default: 2
    Description: Grace period in days after billing due date
  HousekeepingDryRun:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: If true, housekeeping reports overdue objects without deleting
  RelayerWalletAddress:
    Type: String
    Default: ""
    Description: >-
      Base relayer wallet address (0x...) for monitoring and RelayerTransactions pk.
      Set per environment; must match the relayer key in Secrets Manager at
      Prefix/StageName/relayer-private-key (see MnemosparkSecretsPathPrefix and StageName). Monitor
      Lambda no-ops when empty.
  RelayerMonitorScheduleExpression:
    Type: String
    Default: rate(30 minutes)
    Description: EventBridge schedule for Base relayer monitor (stats, health, alerts)
  RestApiCorsAllowOrigin:
    Type: String
    Default: "*"
    Description: >
      Access-Control-Allow-Origin for wallet REST API (comma-separated list allowed in SAM Cors;
      Lambdas echo this via MNEMOSPARK_CORS_ALLOW_ORIGIN). Prefer explicit HTTPS origins in production.
  RestApiCorsAllowHeaders:
    Type: String
    Default: "Content-Type,Authorization,Idempotency-Key,X-Wallet-Signature,x-wallet-signature,PAYMENT-SIGNATURE,PAYMENT-RESPONSE,PAYMENT-REQUIRED,X-PAYMENT,x-payment,x-payment-required,x-payment-response,Cookie"
    Description: Allowed CORS request headers for the REST API (SAM Cors AllowHeaders string).
  DashboardGraphqlCorsAllowOrigin:
    Type: String
    Default: "*"
    Description: Access-Control-Allow-Origin for dashboard GraphQL Lambda (DASHBOARD_GRAPHQL_CORS_ALLOW_ORIGIN).
  MnemosparkLiteBearerSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: >-
      HMAC secret used to sign bearer tokens for mnemospark-lite read endpoints
      (GET /api/mnemospark-lite/uploads, GET /api/mnemospark-lite/download/{uploadId}).

  CdpX402FacilitatorBearerToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: >-
      CDP API bearer token (JWT) used to authenticate requests to the x402 facilitator
      endpoints at https://api.cdp.coinbase.com/platform/v2/x402.

Conditions:
  # Staging: API Gateway CORS for ls-web uses fixed AllowOrigin/AllowHeaders below (SAM --parameter-overrides
  # cannot pass comma-separated RestApiCorsAllowHeaders reliably). AllowCredentials true for this stage only.
  IsStagingStage: !Equals [!Ref StageName, staging]

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 256
    Timeout: 60
    Tags:
      Project: mnemospark

Resources:
  DynamoDbKmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub "CMK for DynamoDB encryption (${AWS::StackName})"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAccountRootAdmin
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowDynamoDBUse
            Effect: Allow
            Principal:
              Service: dynamodb.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:ReEncrypt*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: "*"
            Condition:
              StringEquals:
                "kms:CallerAccount": !Ref AWS::AccountId
              StringLike:
                "kms:ViaService": !Sub "dynamodb.${AWS::Region}.amazonaws.com"
      Tags:
        - Key: Project
          Value: mnemospark

  DynamoDbKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-dynamodb"
      TargetKeyId: !Ref DynamoDbKmsKey

  QuotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-quotes"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: quote_id
          AttributeType: S
      KeySchema:
        - AttributeName: quote_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  UploadTransactionLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-upload-transaction-log"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: quote_id
          AttributeType: S
        - AttributeName: trans_id
          AttributeType: S
      KeySchema:
        - AttributeName: quote_id
          KeyType: HASH
        - AttributeName: trans_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: mnemospark

  UploadIdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-upload-idempotency"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: idempotency_key
          AttributeType: S
      KeySchema:
        - AttributeName: idempotency_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  WalletAuthEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-wallet-auth-events"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  ApiCallsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-api-calls"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  LsWebSessionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-ls-web-sessions"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: exchange_code_hash
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: GsiExchangeCode
          KeySchema:
            - AttributeName: exchange_code_hash
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  PaymentLedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-payments"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: wallet_address
          AttributeType: S
        - AttributeName: quote_id
          AttributeType: S
      KeySchema:
        - AttributeName: wallet_address
          KeyType: HASH
        - AttributeName: quote_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: mnemospark

  ActiveStorageObjectTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-active-storage-objects"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: wallet_address
          AttributeType: S
        - AttributeName: object_key
          AttributeType: S
        - AttributeName: status_active
          AttributeType: S
        - AttributeName: active_inventory_sk
          AttributeType: S
      KeySchema:
        - AttributeName: wallet_address
          KeyType: HASH
        - AttributeName: object_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GsiActiveInventory
          KeySchema:
            - AttributeName: status_active
              KeyType: HASH
            - AttributeName: active_inventory_sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: mnemospark

  MnemosparkLiteUploadRegistryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-mnemospark-lite-uploads"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: upload_id
          AttributeType: S
        - AttributeName: payer_wallet
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: upload_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: GsiByPayerWalletCreatedAt
          KeySchema:
            - AttributeName: payer_wallet
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl_epoch_seconds
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  RenewalTransactionLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-renewal-transaction-log"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: bucket_name
          AttributeType: S
        - AttributeName: billing_period_object_key
          AttributeType: S
        - AttributeName: billing_period
          AttributeType: S
        - AttributeName: wallet_period_sk
          AttributeType: S
      KeySchema:
        - AttributeName: bucket_name
          KeyType: HASH
        - AttributeName: billing_period_object_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GsiRenewalsByPeriodWallet
          KeySchema:
            - AttributeName: billing_period
              KeyType: HASH
            - AttributeName: wallet_period_sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerTransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-relayer-transactions"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-relayer-stats"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerHealthTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-relayer-health"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DynamoDbKmsKey.Arn
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${AWS::StackName}-relayer-alerts"
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerAlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: alerts@mnemospark.ai
      TopicArn: !Ref RelayerAlertsTopic

  PriceStorageLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: price-storage-dynamodb-quotes
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt QuotesTable.Arn
        - PolicyName: price-storage-pricing-query
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - pricing:GetProducts
                  # /price-storage currently uses only Pricing.GetProducts.
                Resource: "*"
        - PolicyName: price-storage-api-calls-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ApiCallsTable.Arn
        - PolicyName: dynamodb-cmk-kms-use
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:GenerateDataKey
                Resource: !GetAtt DynamoDbKmsKey.Arn
      Tags:
        - Key: Project
          Value: mnemospark

  UploadLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: upload-dynamodb-quotes-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt QuotesTable.Arn
        - PolicyName: upload-dynamodb-transaction-log-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !GetAtt UploadTransactionLogTable.Arn
        - PolicyName: upload-dynamodb-idempotency
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt UploadIdempotencyTable.Arn
        - PolicyName: upload-dynamodb-payment-ledger-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt PaymentLedgerTable.Arn
        - PolicyName: upload-dynamodb-active-storage-object
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt ActiveStorageObjectTable.Arn
        - PolicyName: upload-dynamodb-ls-web-session-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt LsWebSessionTable.Arn
        - PolicyName: upload-s3-storage-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:ListBucket
                  - s3:PutLifecycleConfiguration
                  - s3:GetLifecycleConfiguration
                Resource:
                  - !Sub "arn:aws:s3:::mnemospark-*"
                  - !Sub "arn:aws:s3:::mnemospark-lite-*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::mnemospark-*/*"
                  - !Sub "arn:aws:s3:::mnemospark-lite-*/*"
        - PolicyName: upload-dynamodb-mnemospark-lite-upload-registry
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt MnemosparkLiteUploadRegistryTable.Arn
                  - !Sub "${MnemosparkLiteUploadRegistryTable.Arn}/index/*"
        - PolicyName: upload-api-calls-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ApiCallsTable.Arn
        - PolicyName: dynamodb-cmk-kms-use
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:GenerateDataKey
                Resource: !GetAtt DynamoDbKmsKey.Arn
      Tags:
        - Key: Project
          Value: mnemospark

  PaymentSettleLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: payment-settle-dynamodb-quotes-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt QuotesTable.Arn
        - PolicyName: payment-settle-dynamodb-ledger-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt PaymentLedgerTable.Arn
        - PolicyName: payment-settle-relayer-secret-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${MnemosparkSecretsPathPrefix}/${StageName}/relayer-private-key*"
        - PolicyName: payment-settle-api-calls-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ApiCallsTable.Arn
        - PolicyName: payment-settle-relayer-transactions-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt RelayerTransactionsTable.Arn
        - PolicyName: payment-settle-renewal-s3-head
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:HeadBucket
                  - s3:ListBucket
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::mnemospark-*"
                  - !Sub "arn:aws:s3:::mnemospark-*/*"
        - PolicyName: payment-settle-renewal-dynamodb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt ActiveStorageObjectTable.Arn
                  - !GetAtt RenewalTransactionLogTable.Arn
        - PolicyName: dynamodb-cmk-kms-use
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:GenerateDataKey
                Resource: !GetAtt DynamoDbKmsKey.Arn
      Tags:
        - Key: Project
          Value: mnemospark

  BaseRelayerMonitorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: base-relayer-monitor-dynamodb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt RelayerTransactionsTable.Arn
                  - !GetAtt RelayerStatsTable.Arn
                  - !GetAtt RelayerHealthTable.Arn
        - PolicyName: base-relayer-monitor-sns-publish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RelayerAlertsTopic
        - PolicyName: dynamodb-cmk-kms-use
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:GenerateDataKey
                Resource: !GetAtt DynamoDbKmsKey.Arn
      Tags:
        - Key: Project
          Value: mnemospark

  WalletAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: services/wallet-authorizer
      Description: Validates X-Wallet-Signature wallet proofs and returns IAM allow/deny policy.
      Environment:
        Variables:
          MNEMOSPARK_AUTH_MAX_AGE_SECONDS: "300"
          MNEMOSPARK_REQUEST_VERIFYING_CONTRACT: "0x0000000000000000000000000000000000000001"
          WALLET_AUTH_EVENTS_TABLE_NAME: !Ref WalletAuthEventsTable
          WALLET_AUTH_EVENTS_TTL_SECONDS: !Ref WalletAuthEventsTtlSeconds
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt WalletAuthEventsTable.Arn
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
                - kms:GenerateDataKey
              Resource: !GetAtt DynamoDbKmsKey.Arn

  ApiGatewayAccessLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}-${StageName}-access"
      RetentionInDays: !Ref ObservabilityLogRetentionDays
      Tags:
        - Key: Project
          Value: mnemospark

  ApiGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Tags:
        - Key: Project
          Value: mnemospark

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchLogsRole.Arn

  MnemosparkBackendApi:
    Type: AWS::Serverless::Api
    DependsOn:
      - ApiGatewayAccount
      - ApiGatewayAccessLogsLogGroup
    Properties:
      Name: mnemospark-backend-api
      StageName: !Ref StageName
      EndpointConfiguration:
        Type: REGIONAL
      Tags:
        Project: mnemospark
      Auth:
        Authorizers:
          WalletRequestAuthorizer:
            FunctionPayloadType: REQUEST
            FunctionArn: !GetAtt WalletAuthorizerFunction.Arn
            Identity:
              ReauthorizeEvery: 0
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 10
          ThrottlingBurstLimit: 20
          MetricsEnabled: true
          LoggingLevel: INFO
          DataTraceEnabled: false
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayAccessLogsLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: !If
          - IsStagingStage
          - "'Content-Type,Idempotency-Key,X-Wallet-Signature,x-wallet-signature,PAYMENT-SIGNATURE,PAYMENT-RESPONSE,PAYMENT-REQUIRED,X-PAYMENT,x-payment,x-payment-required,x-payment-response,Cookie'"
          - !Sub "'${RestApiCorsAllowHeaders}'"
        AllowOrigin: !If
          - IsStagingStage
          - "'https://app.mnemospark.ai'"
          - !Sub "'${RestApiCorsAllowOrigin}'"
        AllowCredentials: !If [IsStagingStage, true, false]
      GatewayResponses:
        MISSING_AUTHENTICATION_TOKEN:
          StatusCode: "403"
          ResponseParameters:
            Headers:
              X-Content-Type-Options: "'nosniff'"
              Cache-Control: "'no-store'"
              Access-Control-Allow-Origin: !If
                - IsStagingStage
                - "'https://app.mnemospark.ai'"
                - !Sub "'${RestApiCorsAllowOrigin}'"
          ResponseTemplates:
            application/json: '{"message":"Forbidden"}'
        ACCESS_DENIED:
          StatusCode: "403"
          ResponseParameters:
            Headers:
              X-Content-Type-Options: "'nosniff'"
              Cache-Control: "'no-store'"
              Access-Control-Allow-Origin: !If
                - IsStagingStage
                - "'https://app.mnemospark.ai'"
                - !Sub "'${RestApiCorsAllowOrigin}'"
          ResponseTemplates:
            application/json: '{"message":"Forbidden"}'
      Models:
        PriceStorageRequest:
          type: object
          required:
            - wallet_address
            - object_id
            - object_id_hash
            - gb
            - provider
            - region
          properties:
            wallet_address:
              type: string
            object_id:
              type: string
            object_id_hash:
              type: string
            gb:
              type: number
            provider:
              type: string
            region:
              type: string
        StorageUploadRequest:
          type: object
          required:
            - quote_id
            - wallet_address
            - object_id
            - object_id_hash
            - wrapped_dek
          properties:
            quote_id:
              type: string
            wallet_address:
              type: string
            object_id:
              type: string
            object_id_hash:
              type: string
            object_key:
              type: string
            mode:
              type: string
            ciphertext:
              type: string
            wrapped_dek:
              type: string
            content_sha256:
              type: string
            content_length_bytes:
              type: integer
            provider:
              type: string
            location:
              type: string
        UploadConfirmRequest:
          type: object
          required:
            - wallet_address
            - object_key
            - idempotency_key
            - quote_id
          properties:
            wallet_address:
              type: string
            object_key:
              type: string
            idempotency_key:
              type: string
            quote_id:
              type: string
        StorageObjectRequest:
          type: object
          required:
            - wallet_address
            - object_key
          properties:
            wallet_address:
              type: string
            object_key:
              type: string
            location:
              type: string
        StorageLsRequest:
          type: object
          required:
            - wallet_address
          properties:
            wallet_address:
              type: string
            object_key:
              type: string
            location:
              type: string
            continuation_token:
              type: string
            max_keys:
              type: integer
              minimum: 1
              maximum: 1000
            prefix:
              type: string
        StorageLsWebSessionRequest:
          type: object
          properties:
            location:
              type: string
        StorageLsWebExchangeRequest:
          type: object
          required:
            - code
          properties:
            code:
              type: string
        StorageLsWebListRequest:
          type: object
          properties:
            continuation_token:
              type: string
            max_keys:
              type: integer
              minimum: 1
              maximum: 1000
            prefix:
              type: string
            location:
              type: string
        StorageLsWebDownloadRequest:
          type: object
          required:
            - object_keys
          properties:
            object_keys:
              type: array
              minItems: 1
              maxItems: 25
              items:
                type: string
            expires_in_seconds:
              type: integer
              minimum: 1
              maximum: 3600
            location:
              type: string
        PaymentSettleRequest:
          type: object
          required:
            - wallet_address
          properties:
            wallet_address:
              type: string
            quote_id:
              type: string
              description: Required for quote settlement; omit for renewal mode.
            object_key:
              type: string
              description: Required when renewal is true.
            renewal:
              type: boolean
              description: When true, settle monthly renewal without QUOTES_TABLE (Lambda validates).
            payment:
              type: object
              description: Inline payment authorization payload.
            payment_authorization:
              oneOf:
                - type: object
                - type: string
              description: Alternate inline payment authorization envelope.

  MnemosparkBackendApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-rest-api-waf"
      Scope: REGIONAL
      Description: !Sub "WAF for stack ${AWS::StackName} stage ${StageName}"
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}RestApiWaf"
        SampledRequestsEnabled: true
      Rules:
        # POST /storage/upload (any stage prefix): allow large JSON bodies for inline ciphertext
        # without weakening other Common Rule Set rules on this path.
        - Name: AwsManagedCommonStorageUploadPost
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
              ScopeDownStatement:
                AndStatement:
                  Statements:
                    - ByteMatchStatement:
                        SearchString: POST
                        FieldToMatch:
                          Method: {}
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                        PositionalConstraint: EXACTLY
                    - ByteMatchStatement:
                        SearchString: "/storage/upload"
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                        PositionalConstraint: ENDS_WITH
              RuleActionOverrides:
                - Name: SizeRestrictions_BODY
                  ActionToUse:
                    Count: {}
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}AwsManagedCommonUpload"
            SampledRequestsEnabled: true
        - Name: AwsManagedCommonDefault
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
              ScopeDownStatement:
                NotStatement:
                  Statement:
                    AndStatement:
                      Statements:
                        - ByteMatchStatement:
                            SearchString: POST
                            FieldToMatch:
                              Method: {}
                            TextTransformations:
                              - Priority: 0
                                Type: NONE
                            PositionalConstraint: EXACTLY
                        - ByteMatchStatement:
                            SearchString: "/storage/upload"
                            FieldToMatch:
                              UriPath: {}
                            TextTransformations:
                              - Priority: 0
                                Type: NONE
                            PositionalConstraint: ENDS_WITH
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}AwsManagedCommonDefault"
            SampledRequestsEnabled: true
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}AwsManagedKnownBadInputs"
            SampledRequestsEnabled: true
        - Name: RateLimitMnemosparkLiteUploadCompletePost
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 60
              AggregateKeyType: IP
              ScopeDownStatement:
                AndStatement:
                  Statements:
                    - ByteMatchStatement:
                        SearchString: POST
                        FieldToMatch:
                          Method: {}
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                        PositionalConstraint: EXACTLY
                    - ByteMatchStatement:
                        SearchString: "/api/mnemospark-lite/upload/complete"
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                        PositionalConstraint: ENDS_WITH
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}RateLimitLiteUploadComplete"
            SampledRequestsEnabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  MnemosparkBackendApiWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    DependsOn:
      - MnemosparkBackendApiStage
    Properties:
      WebACLArn: !GetAtt MnemosparkBackendApiWebAcl.Arn
      ResourceArn: !Sub
        - "arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${RestApiId}/stages/${Stage}"
        - RestApiId: !Ref MnemosparkBackendApi
          Stage: !Ref StageName

  DashboardGraphQLLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: dashboard-graphql-dynamodb-readonly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt QuotesTable.Arn
                  - !Sub "${QuotesTable.Arn}/index/*"
                  - !GetAtt UploadTransactionLogTable.Arn
                  - !Sub "${UploadTransactionLogTable.Arn}/index/*"
                  - !GetAtt UploadIdempotencyTable.Arn
                  - !Sub "${UploadIdempotencyTable.Arn}/index/*"
                  - !GetAtt WalletAuthEventsTable.Arn
                  - !Sub "${WalletAuthEventsTable.Arn}/index/*"
                  - !GetAtt ApiCallsTable.Arn
                  - !Sub "${ApiCallsTable.Arn}/index/*"
                  - !GetAtt PaymentLedgerTable.Arn
                  - !Sub "${PaymentLedgerTable.Arn}/index/*"
                  - !GetAtt ActiveStorageObjectTable.Arn
                  - !Sub "${ActiveStorageObjectTable.Arn}/index/*"
                  - !GetAtt RenewalTransactionLogTable.Arn
                  - !Sub "${RenewalTransactionLogTable.Arn}/index/*"
                  - !GetAtt RelayerTransactionsTable.Arn
                  - !Sub "${RelayerTransactionsTable.Arn}/index/*"
                  - !GetAtt RelayerStatsTable.Arn
                  - !Sub "${RelayerStatsTable.Arn}/index/*"
                  - !GetAtt RelayerHealthTable.Arn
                  - !Sub "${RelayerHealthTable.Arn}/index/*"
        - PolicyName: dynamodb-cmk-kms-use
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:GenerateDataKey
                Resource: !GetAtt DynamoDbKmsKey.Arn
      Tags:
        - Key: Project
          Value: mnemospark

  DashboardGraphqlAuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-dashboard-graphql-authorizer"
      RetentionInDays: !Ref ObservabilityLogRetentionDays
      Tags:
        - Key: Project
          Value: mnemospark

  DashboardGraphqlAuthorizerFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - DashboardGraphqlAuthorizerFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-dashboard-graphql-authorizer"
      Handler: app.lambda_handler
      CodeUri: services/dashboard_graphql_authorizer
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          DASHBOARD_GRAPHQL_API_KEY_SECRET_ID: !Sub "${MnemosparkSecretsPathPrefix}/${StageName}/dashboard-graphql-api-key"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${MnemosparkSecretsPathPrefix}/${StageName}/dashboard-graphql-api-key*"
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub "secretsmanager.${AWS::Region}.amazonaws.com"

  DashboardGraphQLHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      Description: Internal read-only GraphQL for Ops Console (dashboard v2); x-api-key validated by Lambda authorizer.
      Tags:
        Project: mnemospark
      CorsConfiguration:
        AllowOrigins:
          - !Ref DashboardGraphqlCorsAllowOrigin
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
          - x-api-key
          - authorization
          - x-amz-date
          - x-amz-security-token
        MaxAge: 600
      Auth:
        DefaultAuthorizer: DashboardGraphqlApiKeyAuthorizer
        Authorizers:
          DashboardGraphqlApiKeyAuthorizer:
            FunctionArn: !GetAtt DashboardGraphqlAuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true
            EnableFunctionDefaultPermissions: true
            Identity:
              Headers:
                - x-api-key

  DashboardGraphQLFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-dashboard-graphql"
      RetentionInDays: !Ref ObservabilityLogRetentionDays
      Tags:
        - Key: Project
          Value: mnemospark

  DashboardGraphQLFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - DashboardGraphQLFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-dashboard-graphql"
      Handler: app.lambda_handler
      CodeUri: services/dashboard_graphql
      Role: !GetAtt DashboardGraphQLLambdaRole.Arn
      MemorySize: 1024
      Timeout: 120
      Environment:
        Variables:
          PAYMENT_LEDGER_TABLE_NAME: !Ref PaymentLedgerTable
          QUOTES_TABLE_NAME: !Ref QuotesTable
          UPLOAD_TRANSACTION_LOG_TABLE_NAME: !Ref UploadTransactionLogTable
          WALLET_AUTH_EVENTS_TABLE_NAME: !Ref WalletAuthEventsTable
          API_CALLS_TABLE_NAME: !Ref ApiCallsTable
          DASHBOARD_GRAPHQL_CORS_ALLOW_ORIGIN: !Ref DashboardGraphqlCorsAllowOrigin
      Events:
        DashboardGraphqlPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref DashboardGraphQLHttpApi
            Path: /graphql
            Method: POST
            Auth:
              Authorizer: DashboardGraphqlApiKeyAuthorizer

  PriceStorageFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: price_storage_entry.lambda_handler
      CodeUri: services
      Role: !GetAtt PriceStorageLambdaRole.Arn
      Environment:
        Variables:
          QUOTES_TABLE_NAME: !Ref QuotesTable
          QUOTE_TTL_SECONDS: !Ref PriceStorageQuoteTtlSeconds
          PRICE_STORAGE_MARKUP: !Ref PriceStorageMarkup
          PRICE_STORAGE_FLOOR: !Ref PriceStorageFloor
          PRICE_STORAGE_TRANSFER_DIRECTION: out
          PRICE_STORAGE_RATE_TYPE: BEFORE_DISCOUNTS
          API_CALLS_TABLE_NAME: !Ref ApiCallsTable
          API_CALLS_TTL_SECONDS: !Ref ApiCallsTtlSeconds
          MNEMOSPARK_CORS_ALLOW_ORIGIN: !Ref RestApiCorsAllowOrigin
      Events:
        PriceStoragePost:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /price-storage
            Method: POST
            Auth:
              Authorizer: WalletRequestAuthorizer
            RequestModel:
              Model: PriceStorageRequest
              Required: true
              ValidateBody: true
              ValidateParameters: true

  StorageUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: storage_upload_entry.lambda_handler
      CodeUri: services
      Role: !GetAtt UploadLambdaRole.Arn
      Environment:
        Variables:
          QUOTES_TABLE_NAME: !Ref QuotesTable
          UPLOAD_TRANSACTION_LOG_TABLE_NAME: !Ref UploadTransactionLogTable
          UPLOAD_IDEMPOTENCY_TABLE_NAME: !Ref UploadIdempotencyTable
          PAYMENT_LEDGER_TABLE_NAME: !Ref PaymentLedgerTable
          MNEMOSPARK_RECIPIENT_WALLET: !Ref MnemosparkRecipientWallet
          MNEMOSPARK_PAYMENT_NETWORK: !Ref PaymentNetwork
          MNEMOSPARK_PAYMENT_ASSET: !Ref PaymentAssetAddress
          API_CALLS_TABLE_NAME: !Ref ApiCallsTable
          API_CALLS_TTL_SECONDS: !Ref ApiCallsTtlSeconds
          ACTIVE_STORAGE_OBJECT_TABLE_NAME: !Ref ActiveStorageObjectTable
          MNEMOSPARK_CORS_ALLOW_ORIGIN: !Ref RestApiCorsAllowOrigin
      Events:
        StorageUploadPost:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/upload
            Method: POST
            Auth:
              Authorizer: WalletRequestAuthorizer
            RequestModel:
              Model: StorageUploadRequest
              Required: true
              ValidateBody: true
              ValidateParameters: true
            RequestParameters:
              - method.request.header.Idempotency-Key:
                  Required: false
                  Caching: false
              - method.request.header.PAYMENT-SIGNATURE:
                  Required: false
                  Caching: false
              - method.request.header.x-payment:
                  Required: false
                  Caching: false
              - method.request.header.X-PAYMENT:
                  Required: false
                  Caching: false

  StorageUploadConfirmFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: storage_upload_entry.confirm_upload_handler
      CodeUri: services
      Role: !GetAtt UploadLambdaRole.Arn
      Environment:
        Variables:
          QUOTES_TABLE_NAME: !Ref QuotesTable
          UPLOAD_TRANSACTION_LOG_TABLE_NAME: !Ref UploadTransactionLogTable
          UPLOAD_IDEMPOTENCY_TABLE_NAME: !Ref UploadIdempotencyTable
          PAYMENT_LEDGER_TABLE_NAME: !Ref PaymentLedgerTable
          MNEMOSPARK_RECIPIENT_WALLET: !Ref MnemosparkRecipientWallet
          MNEMOSPARK_PAYMENT_NETWORK: !Ref PaymentNetwork
          MNEMOSPARK_PAYMENT_ASSET: !Ref PaymentAssetAddress
          API_CALLS_TABLE_NAME: !Ref ApiCallsTable
          API_CALLS_TTL_SECONDS: !Ref ApiCallsTtlSeconds
          ACTIVE_STORAGE_OBJECT_TABLE_NAME: !Ref ActiveStorageObjectTable
          MNEMOSPARK_CORS_ALLOW_ORIGIN: !Ref RestApiCorsAllowOrigin
      Events:
        StorageUploadConfirmPost:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/upload/confirm
            Method: POST
            Auth:
              Authorizer: WalletRequestAuthorizer
            RequestModel:
              Model: UploadConfirmRequest
              Required: true
              ValidateBody: true
              ValidateParameters: true
            RequestParameters:
              - method.request.header.Idempotency-Key:
                  Required: false
                  Caching: false
              - method.request.header.X-Wallet-Signature:
                  Required: false
                  Caching: false
              - method.request.header.x-wallet-signature:
                  Required: false
                  Caching: false

  PaymentSettleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: payment_settle_entry.lambda_handler
      CodeUri: services
      Role: !GetAtt PaymentSettleLambdaRole.Arn
      Environment:
        Variables:
          QUOTES_TABLE_NAME: !Ref QuotesTable
          PAYMENT_LEDGER_TABLE_NAME: !Ref PaymentLedgerTable
          MNEMOSPARK_RECIPIENT_WALLET: !Ref MnemosparkRecipientWallet
          MNEMOSPARK_PAYMENT_NETWORK: !Ref PaymentNetwork
          MNEMOSPARK_PAYMENT_ASSET: !Ref PaymentAssetAddress
          MNEMOSPARK_PAYMENT_SETTLEMENT_MODE: !Ref PaymentSettlementMode
          MNEMOSPARK_BASE_RPC_URL: !Ref BaseRpcUrl
          MNEMOSPARK_RELAYER_SECRET_ID: !Sub "${MnemosparkSecretsPathPrefix}/${StageName}/relayer-private-key"
          RELAYER_TRANSACTIONS_TABLE_NAME: !Ref RelayerTransactionsTable
          API_CALLS_TABLE_NAME: !Ref ApiCallsTable
          API_CALLS_TTL_SECONDS: !Ref ApiCallsTtlSeconds
          ACTIVE_STORAGE_OBJECT_TABLE_NAME: !Ref ActiveStorageObjectTable
          RENEWAL_TRANSACTION_LOG_TABLE_NAME: !Ref RenewalTransactionLogTable
          MNEMOSPARK_CORS_ALLOW_ORIGIN: !Ref RestApiCorsAllowOrigin
      Events:
        PaymentSettlePost:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /payment/settle
