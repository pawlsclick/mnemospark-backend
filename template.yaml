            Auth:
              Authorizer: WalletRequestAuthorizer
            RequestModel:
              Model: PaymentSettleRequest
              Required: true
              ValidateBody: true
              ValidateParameters: true
            RequestParameters:
              - method.request.header.PAYMENT-SIGNATURE:
                  Required: false
                  Caching: false
              - method.request.header.x-payment:
                  Required: false
                  Caching: false
              - method.request.header.X-PAYMENT:
                  Required: false
                  Caching: false

