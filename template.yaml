  StorageLsWebFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: storage_ls_web_entry.lambda_handler
      CodeUri: services
      Environment:
        Variables:
          LS_WEB_SESSION_TABLE_NAME: !Ref LsWebSessionTable
          MNEMOSPARK_LITE_UPLOADS_TABLE_NAME: !Ref MnemosparkLiteUploadRegistryTable
          API_CALLS_TABLE_NAME: !Ref ApiCallsTable
          API_CALLS_TTL_SECONDS: !Ref ApiCallsTtlSeconds
          MNEMOSPARK_LS_WEB_CORS_ORIGIN: "https://app.mnemospark.ai"
          MNEMOSPARK_LS_WEB_APP_URL: "https://app.mnemospark.ai"
          # Staging mint must open the shell with ?api=staging so exchange/list hit api-staging (not prod).
          MNEMOSPARK_LS_WEB_APP_PREFIX_QUERY: !If [IsStagingStage, "api=staging", ""]
          # Staging API is on api-staging.mnemospark.ai (same-site with app); use production-like cookie flags.
          LS_WEB_COOKIE_DOMAIN: ".mnemospark.ai"
          LS_WEB_COOKIE_SAMESITE: "Lax"
      Events:
        StorageLsWebSessionPost:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/ls-web/session
            Method: POST
            Auth:
              Authorizer: WalletRequestAuthorizer
            RequestModel:
              Model: StorageLsWebSessionRequest
              Required: false
              ValidateBody: true
              ValidateParameters: true
        StorageLsWebExchangePost:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/ls-web/exchange
            Method: POST
            RequestModel:
              Model: StorageLsWebExchangeRequest
              Required: true
              ValidateBody: true
              ValidateParameters: true
        StorageLsWebListPost:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/ls-web/list
            Method: POST
            RequestModel:
              Model: StorageLsWebListRequest
              Required: false
              ValidateBody: true
              ValidateParameters: true
        StorageLsWebDownloadPost:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/ls-web/download
            Method: POST
            RequestModel:
              Model: StorageLsWebDownloadRequest
              Required: true
              ValidateBody: true
              ValidateParameters: true
        # OPTIONS via Lambda: SAM API Cors mock omits Access-Control-Allow-Credentials on preflight.
        StorageLsWebExchangeOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/ls-web/exchange
            Method: OPTIONS
        StorageLsWebListOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/ls-web/list
            Method: OPTIONS
        StorageLsWebDownloadOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MnemosparkBackendApi
            Path: /storage/ls-web/download
            Method: OPTIONS
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt LsWebSessionTable.Arn
                - !Sub "${LsWebSessionTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource:
                - !GetAtt MnemosparkLiteUploadRegistryTable.Arn
                - !Sub "${MnemosparkLiteUploadRegistryTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !Sub "arn:aws:s3:::mnemospark-*"
                - !Sub "arn:aws:s3:::mnemospark-lite-*"
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub "arn:aws:s3:::mnemospark-*/*"
                - !Sub "arn:aws:s3:::mnemospark-lite-*/*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt ApiCallsTable.Arn
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
                - kms:GenerateDataKey
              Resource: !GetAtt DynamoDbKmsKey.Arn

