              - method.request.querystring.object_key:
                  Required: false
                  Caching: false
              - method.request.querystring.location:
                  Required: false
                  Caching: false
              - method.request.querystring.continuation_token:
                  Required: false
                  Caching: false
              - method.request.querystring.max_keys:
                  Required: false
                  Caching: false
              - method.request.querystring.prefix:
