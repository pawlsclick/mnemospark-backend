      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !Sub "arn:aws:s3:::mnemospark-*"
            - Effect: Allow
              Action:
                - s3:GetObject
