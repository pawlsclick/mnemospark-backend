AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  mnemospark-backend internet-facing REST API.
  Path-based routing to Lambda functions with wallet-proof Lambda authorizer auth, throttling,
  quota, request validation, and CORS. Resources are tagged Project: mnemospark.

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: API Gateway stage name
  ObservabilityLogRetentionDays:
    Type: Number
    Default: 30
    Description: Retention in days for API Gateway and Lambda log groups
  PriceStorageMarkup:
    Type: String
    Default: "0"
    Description: >
      Percent markup on the subtotal after the floor (PriceStorageFloor), e.g. 10 = 10%.
  PriceStorageQuoteTtlSeconds:
    Type: String
    Default: "3600"
    Description: Quote TTL in seconds for DynamoDB expiration
  PriceStorageFloor:
    Type: String
    Default: "0"
    Description: >
      Minimum USD for storage+transfer before markup. Default 0 so quotes scale with AWS estimates.
  WalletAuthEventsTtlSeconds:
    Type: String
    Default: "2592000"
    Description: TTL in seconds for wallet authorizer auth event records
  ApiCallsTtlSeconds:
    Type: String
    Default: "2592000"
    Description: TTL in seconds for API call logging records
  MnemosparkRecipientWallet:
    Type: String
    Default: "0x47D241ae97fE37186AC59894290CA1c54c060A6c"
    Description: Recipient wallet address for x402 USDC payments
  PaymentNetwork:
    Type: String
    Default: eip155:8453
    Description: CAIP-2 network identifier for payment verification
  PaymentAssetAddress:
    Type: String
    Default: "0x833589fCD6EDb6E08f4C7C32D4f71b54bdA02913"
    Description: USDC token contract address for payment verification
  PaymentSettlementMode:
    Type: String
    Default: onchain
    AllowedValues:
      - mock
      - onchain
    Description: >-
      Payment settlement mode for upload flow. Default is onchain (real USDC
      transfers on Base). Set to mock only for testing/development (generates
      deterministic pseudo-tx IDs, no on-chain transaction).
  BaseRpcUrl:
    Type: String
    Default: ""
    Description: Base chain RPC URL used when PaymentSettlementMode is onchain
  RelayerPrivateKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Relayer private key used when PaymentSettlementMode is onchain
  HousekeepingScheduleExpression:
    Type: String
    Default: rate(1 day)
    Description: >
      EventBridge schedule for storage housekeeping. Use rate(1 day) with
      HousekeepingMode legacy_interval. For renewal_calendar use cron(0 12 3 * ? *)
      (3rd of month, 12:00 UTC).
  HousekeepingMode:
    Type: String
    Default: legacy_interval
    AllowedValues:
      - legacy_interval
      - renewal_calendar
    Description: >
      legacy_interval: 32-day scan of upload transaction log (default schedule rate(1 day)).
      renewal_calendar: require monthly renewal row; pair with cron on day 3 UTC.
  HousekeepingRenewalCheckHourUtc:
    Type: Number
    Default: 12
    Description: Hour (0-23 UTC) for renewal_calendar description only; encode in cron expression.
  HousekeepingBillingIntervalDays:
    Type: Number
    Default: 30
    Description: Billing interval in days before storage payment is due
  HousekeepingGracePeriodDays:
    Type: Number
    Default: 2
    Description: Grace period in days after billing due date
  HousekeepingDryRun:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: If true, housekeeping reports overdue objects without deleting
  RelayerWalletAddress:
    Type: String
    Default: "0x604d308201626a0A8a67B46112943D08dbd99bC8"
    Description: >-
      Base relayer wallet address (0x...) for monitoring and RelayerTransactions pk.
      Override per environment if needed; monitor Lambda no-ops when set empty.
  RelayerMonitorScheduleExpression:
    Type: String
    Default: rate(30 minutes)
    Description: EventBridge schedule for Base relayer monitor (stats, health, alerts)
  DashboardGraphqlApiKeySecretArn:
    Type: String
    Description: >
      Secrets Manager secret ARN for the dashboard GraphQL API key (x-api-key).
      Create the secret before deploy; pass via sam deploy --parameter-overrides or samconfig.

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 256
    Timeout: 60
    Tags:
      Project: mnemospark

Resources:
  QuotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-quotes"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: quote_id
          AttributeType: S
      KeySchema:
        - AttributeName: quote_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  UploadTransactionLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-upload-transaction-log"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: quote_id
          AttributeType: S
        - AttributeName: trans_id
          AttributeType: S
      KeySchema:
        - AttributeName: quote_id
          KeyType: HASH
        - AttributeName: trans_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: mnemospark

  UploadIdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-upload-idempotency"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotency_key
          AttributeType: S
      KeySchema:
        - AttributeName: idempotency_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  WalletAuthEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-wallet-auth-events"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  ApiCallsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-api-calls"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: mnemospark

  PaymentLedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-payments"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: wallet_address
          AttributeType: S
        - AttributeName: quote_id
          AttributeType: S
      KeySchema:
        - AttributeName: wallet_address
          KeyType: HASH
        - AttributeName: quote_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: mnemospark

  ActiveStorageObjectTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-active-storage-objects"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: wallet_address
          AttributeType: S
        - AttributeName: object_key
          AttributeType: S
        - AttributeName: status_active
          AttributeType: S
        - AttributeName: active_inventory_sk
          AttributeType: S
      KeySchema:
        - AttributeName: wallet_address
          KeyType: HASH
        - AttributeName: object_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GsiActiveInventory
          KeySchema:
            - AttributeName: status_active
              KeyType: HASH
            - AttributeName: active_inventory_sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: mnemospark

  RenewalTransactionLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-renewal-transaction-log"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: bucket_name
          AttributeType: S
        - AttributeName: billing_period_object_key
          AttributeType: S
        - AttributeName: billing_period
          AttributeType: S
        - AttributeName: wallet_period_sk
          AttributeType: S
      KeySchema:
        - AttributeName: bucket_name
          KeyType: HASH
        - AttributeName: billing_period_object_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GsiRenewalsByPeriodWallet
          KeySchema:
            - AttributeName: billing_period
              KeyType: HASH
            - AttributeName: wallet_period_sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerTransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-relayer-transactions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-relayer-stats"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerHealthTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-relayer-health"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${AWS::StackName}-relayer-alerts"
      Tags:
        - Key: Project
          Value: mnemospark

  RelayerAlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: alerts@mnemospark.ai
      TopicArn: !Ref RelayerAlertsTopic

  PriceStorageLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: price-storage-dynamodb-quotes
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt QuotesTable.Arn
        - PolicyName: price-storage-pricing-query
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - pricing:GetProducts
                  # /price-storage currently uses only Pricing.GetProducts.
                Resource: "*"
        - PolicyName: price-storage-api-calls-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ApiCallsTable.Arn
      Tags:
        - Key: Project
          Value: mnemospark

  UploadLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: upload-dynamodb-quotes-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt QuotesTable.Arn
        - PolicyName: upload-dynamodb-transaction-log-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !GetAtt UploadTransactionLogTable.Arn
        - PolicyName: upload-dynamodb-idempotency
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt UploadIdempotencyTable.Arn
        - PolicyName: upload-dynamodb-payment-ledger-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt PaymentLedgerTable.Arn
        - PolicyName: upload-dynamodb-active-storage-object
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt ActiveStorageObjectTable.Arn
        - PolicyName: upload-s3-storage-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::mnemospark-*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::mnemospark-*/*"
        - PolicyName: upload-api-calls-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ApiCallsTable.Arn
      Tags:
        - Key: Project
          Value: mnemospark

  PaymentSettleLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: payment-settle-dynamodb-quotes-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt QuotesTable.Arn
        - PolicyName: payment-settle-dynamodb-ledger-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt PaymentLedgerTable.Arn
        - PolicyName: payment-settle-relayer-secret-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mnemospark/relayer-private-key*"
        - PolicyName: payment-settle-api-calls-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ApiCallsTable.Arn
        - PolicyName: payment-settle-relayer-transactions-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt RelayerTransactionsTable.Arn
        - PolicyName: payment-settle-renewal-s3-head
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:HeadBucket
                  - s3:ListBucket
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::mnemospark-*"
                  - !Sub "arn:aws:s3:::mnemospark-*/*"
        - PolicyName: payment-settle-renewal-dynamodb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt ActiveStorageObjectTable.Arn
                  - !GetAtt RenewalTransactionLogTable.Arn
      Tags:
        - Key: Project
          Value: mnemospark

  BaseRelayerMonitorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: base-relayer-monitor-dynamodb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt RelayerTransactionsTable.Arn
                  - !GetAtt RelayerStatsTable.Arn
                  - !GetAtt RelayerHealthTable.Arn
        - PolicyName: base-relayer-monitor-sns-publish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RelayerAlertsTopic
      Tags:
        - Key: Project
          Value: mnemospark

  WalletAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: services/wallet-authorizer
      Description: Validates X-Wallet-Signature wallet proofs and returns IAM allow/deny policy.
      Environment:
        Variables:
          MNEMOSPARK_AUTH_MAX_AGE_SECONDS: "300"
          MNEMOSPARK_REQUEST_VERIFYING_CONTRACT: "0x0000000000000000000000000000000000000001"
          WALLET_AUTH_EVENTS_TABLE_NAME: !Ref WalletAuthEventsTable
          WALLET_AUTH_EVENTS_TTL_SECONDS: !Ref WalletAuthEventsTtlSeconds
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt WalletAuthEventsTable.Arn

  ApiGatewayAccessLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}-${StageName}-access"
      RetentionInDays: !Ref ObservabilityLogRetentionDays
      Tags:
        - Key: Project
          Value: mnemospark

  ApiGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Tags:
        - Key: Project
          Value: mnemospark

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchLogsRole.Arn

  MnemosparkBackendApi:
    Type: AWS::Serverless::Api
    DependsOn:
      - ApiGatewayAccount
      - ApiGatewayAccessLogsLogGroup
    Properties:
      Name: mnemospark-backend-api
      StageName: !Ref StageName
      EndpointConfiguration:
        Type: REGIONAL
      Tags:
        Project: mnemospark
      Auth:
        Authorizers:
          WalletRequestAuthorizer:
            FunctionPayloadType: REQUEST
            FunctionArn: !GetAtt WalletAuthorizerFunction.Arn
            Identity:
              ReauthorizeEvery: 0
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 10
          ThrottlingBurstLimit: 20
          MetricsEnabled: true
          LoggingLevel: INFO
          DataTraceEnabled: false
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayAccessLogsLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Idempotency-Key,X-Wallet-Signature,x-wallet-signature,PAYMENT-SIGNATURE,PAYMENT-RESPONSE,PAYMENT-REQUIRED,X-PAYMENT,x-payment,x-payment-required,x-payment-response'"
        AllowOrigin: "'*'"
      Models:
        PriceStorageRequest:
          type: object
          required:
            - wallet_address
            - object_id
            - object_id_hash
            - gb
            - provider
            - region
          properties:
            wallet_address:
              type: string
            object_id:
              type: string
            object_id_hash:
              type: string
            gb:
              type: number
            provider:
              type: string
            region:
              type: string
        StorageUploadRequest:
          type: object
          required:
            - quote_id
            - wallet_address
            - object_id
            - object_id_hash
            - wrapped_dek
          properties:
            quote_id:
              type: string
            wallet_address:
              type: string
            object_id:
              type: string
            object_id_hash:
              type: string
            object_key:
              type: string
            mode:
              type: string
            ciphertext:
              type: string
            wrapped_dek:
              type: string
            content_sha256:
              type: string
            content_length_bytes:
              type: integer
            provider:
              type: string
            location:
              type: string
        UploadConfirmRequest:
          type: object
          required:
            - wallet_address
            - object_key
            - idempotency_key
            - quote_id
          properties:
            wallet_address:
              type: string
            object_key:
              type: string
            idempotency_key:
              type: string
            quote_id:
              type: string
        StorageObjectRequest:
          type: object
          required:
            - wallet_address
            - object_key
          properties:
            wallet_address:
              type: string
            object_key:
              type: string
            location:
              type: string
        StorageLsRequest:
          type: object
          required:
            - wallet_address
          properties:
            wallet_address:
              type: string
            object_key:
              type: string
            location:
              type: string
            continuation_token:
              type: string
            max_keys:
              type: integer
              minimum: 1
              maximum: 1000
            prefix:
              type: string
        PaymentSettleRequest:
          type: object
          required:
            - wallet_address
          properties:
            wallet_address:
              type: string
            quote_id:
              type: string
              description: Required for quote settlement; omit for renewal mode.
            object_key:
              type: string
              description: Required when renewal is true.
            renewal:
              type: boolean
              description: When true, settle monthly renewal without QUOTES_TABLE (Lambda validates).
            payment:
              type: object
              description: Inline payment authorization payload.
            payment_authorization:
              oneOf:
                - type: object
                - type: string
              description: Alternate inline payment authorization envelope.

  DashboardGraphQLLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: dashboard-graphql-dynamodb-readonly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt QuotesTable.Arn
                  - !Sub "${QuotesTable.Arn}/index/*"
                  - !GetAtt UploadTransactionLogTable.Arn
                  - !Sub "${UploadTransactionLogTable.Arn}/index/*"
                  - !GetAtt UploadIdempotencyTable.Arn
                  - !Sub "${UploadIdempotencyTable.Arn}/index/*"
                  - !GetAtt WalletAuthEventsTable.Arn
                  - !Sub "${WalletAuthEventsTable.Arn}/index/*"
                  - !GetAtt ApiCallsTable.Arn
                  - !Sub "${ApiCallsTable.Arn}/index/*"
                  - !GetAtt PaymentLedgerTable.Arn
                  - !Sub "${PaymentLedgerTable.Arn}/index/*"
                  - !GetAtt ActiveStorageObjectTable.Arn
                  - !Sub "${ActiveStorageObjectTable.Arn}/index/*"
                  - !GetAtt RenewalTransactionLogTable.Arn
                  - !Sub "${RenewalTransactionLogTable.Arn}/index/*"
                  - !GetAtt RelayerTransactionsTable.Arn
                  - !Sub "${RelayerTransactionsTable.Arn}/index/*"
                  - !GetAtt RelayerStatsTable.Arn
                  - !Sub "${RelayerStatsTable.Arn}/index/*"
                  - !GetAtt RelayerHealthTable.Arn
